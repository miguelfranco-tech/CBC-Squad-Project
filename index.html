<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#eef4ff,#f9fbff);
  text-align:center;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h1{ color:#1565c0; }

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  font-size:16px;
  border:1px solid #ccc;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.primary{ background:#1976d2; color:white; }
.secondary{ background:#e3f2fd; color:#1565c0; }

.result{
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  text-align:left;
}

.baixo{ background:#e8f5e9; border-left:5px solid #4caf50; }
.medio{ background:#fffde7; border-left:5px solid #ffb300; }
.alto{ background:#ffebee; border-left:5px solid #f44336; }

#feedbackTreino{ margin-top:10px; font-weight:bold; }
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>
<p>Detecta golpes e ajuda você a não cair neles.</p>

<textarea id="mensagem" placeholder="Digite ou cole a mensagem"></textarea>

<br>
<button class="primary" onclick="analisar()">🔎 Analisar mensagem</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar mensagem</button>

<br>
<button class="secondary" onclick="gerarPorNivel('alto')">🔴 Golpe</button>
<button class="secondary" onclick="gerarPorNivel('medio')">🟡 Suspeita</button>
<button class="secondary" onclick="gerarPorNivel('baixo')">🟢 Normal</button>

<h3 style="margin-top:20px;">⚠️ Exemplos de golpes</h3>

<button class="secondary" onclick="exemplo('banco')">🏦 Banco</button>
<button class="secondary" onclick="exemplo('premio')">🎁 Prêmio</button>
<button class="secondary" onclick="exemplo('fake')">📢 Fake News</button>

<div id="resultado" class="result"></div>

<h3 style="margin-top:25px;">🧠 Treinamento para não cair em golpes</h3>
<p id="treinoTexto" style="font-weight:bold;"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✔ É seguro</button>

<p id="feedbackTreino"></p>

<div>
<div style="background:#ddd;height:18px;border-radius:10px;">
<div id="barraProgresso" style="height:100%;width:0%;background:#4caf50;border-radius:10px;"></div>
</div>
<p id="textoProgresso">0 de 0</p>
</div>

</div>

<script>

// NORMALIZAR
function normalizar(txt){
return txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// ================= IA =================
function analisar(){

let original = document.getElementById("mensagem").value;

if(!original){
document.getElementById("resultado").innerHTML="Digite uma mensagem.";
return;
}

let texto = normalizar(original);

let risco = 0;
let motivos = [];

// PADRÕES
const fortes = [
/troquei.*numero/,
/manda.*dinheiro/,
/pix.*urgente/,
/cartao.*clonado/,
/confirme.*dados/,
/envie.*cpf/,
/envie.*senha/,
/conta.*bloqueada/,
/ganhou.*premio/,
/transferencia.*urgente/,
/seguranca.*comprometida/
];

const medios = [
/urgente/,/agora/,/clique/,/link/,/promocao/,/beneficio/,/pix/,/dinheiro/
];

fortes.forEach(r=>{
if(r.test(texto)){ risco+=45; motivos.push("Padrão forte de golpe"); }
});

medios.forEach(r=>{
if(r.test(texto)){ risco+=12; motivos.push("Sinal suspeito"); }
});

// CONTEXTO
if(texto.includes("urgente") && texto.includes("pix")){
risco+=40; motivos.push("Urgência + dinheiro");
}

if(texto.includes("dados") && texto.includes("confirme")){
risco+=35; motivos.push("Pedido de dados");
}

if(risco>100) risco=100;

// NÍVEL
let nivel = risco<30?"🟢 Seguro":risco<70?"🟡 Atenção":"🔴 Golpe";
let classe = risco<30?"baixo":risco<70?"medio":"alto";

let r = document.getElementById("resultado");
r.className="result "+classe;

// TIPO
let tipo="Indefinido";

if(texto.includes("troquei")||texto.includes("mãe")) tipo="Golpe do familiar";
else if(texto.includes("cartao")||texto.includes("conta")) tipo="Golpe bancário";
else if(texto.includes("premio")) tipo="Golpe de prêmio falso";
else if(texto.includes("pix")) tipo="Golpe com PIX";
else if(texto.includes("link")) tipo="Golpe com link";

// EXPLICAÇÃO
let explicacao = risco<30
? "Essa mensagem parece normal, mas ainda é importante manter atenção."
: risco<70
? "Essa mensagem tem sinais suspeitos e pode ser um golpe."
: "Essa mensagem tem vários sinais claros de golpe.";

// RESPOSTA HUMANA
r.innerHTML=`
<h3>${nivel}</h3>

<p><b>📌 Tipo identificado:</b> ${tipo}</p>

<p><b>🔎 Entenda:</b><br>
${explicacao}
</p>

<p><b>⚠️ Sinais encontrados:</b><br>
${motivos.join("<br>")||"Nenhum sinal forte"}
</p>

<p><b>👉 O que fazer:</b><br>
• Não clique em links<br>
• Não envie dinheiro<br>
• Não informe dados<br>
• Confirme fora da conversa
</p>
`;
}

// ================= GERAR =================
function gerarMensagem(){
const m=[
"Mãe troquei de número me manda dinheiro",
"PIX urgente preciso agora",
"Seu cartão foi clonado confirme dados",
"Promoção exclusiva informe dados",
"Conta bloqueada envie CPF",
"Você ganhou prêmio clique aqui",
"Atualize seus dados agora",
"Transferência urgente necessária",
"Ação urgente necessária",
"Seu pacote chegou clique aqui"
];
document.getElementById("mensagem").value = m[Math.floor(Math.random()*m.length)];
}

// GERAR POR NÍVEL
function gerarPorNivel(n){
const modelos={
alto:["PIX urgente agora","Conta bloqueada envie dados","Cartão clonado confirme"],
medio:["Verifique sua conta","Atualize seus dados","Promoção disponível"],
baixo:["Te ligo depois","Reunião amanhã","Tudo certo"]
};
document.getElementById("mensagem").value =
modelos[n][Math.floor(Math.random()*modelos[n].length)];
}

// EXEMPLOS
function exemplo(tipo){
const exemplos={
banco:[
"Seu banco detectou atividade suspeita, confirme seus dados",
"Conta bloqueada, envie CPF para desbloquear",
"Cartão clonado, atualize suas informações agora"
],
premio:[
"Parabéns! Você ganhou um prêmio, clique para receber",
"Você foi selecionado, informe seus dados para retirar o prêmio",
"Última chance de resgatar seu prêmio exclusivo"
],
fake:[
"URGENTE: bancos vão fechar amanhã, saque seu dinheiro",
"Nova lei permite ganhar dinheiro fácil, aproveite",
"Alerta geral: governo vai bloquear contas hoje"
]
};
document.getElementById("mensagem").value =
exemplos[tipo][Math.floor(Math.random()*3)];
}

// TREINO
const perguntas=[
{t:"PIX urgente preciso agora",g:true},
{t:"Reunião amanhã",g:false},
{t:"Você ganhou prêmio",g:true},
{t:"Vamos almoçar?",g:false}
];

let atual=0,acertos=0,total=0;

function novaPergunta(){
atual=Math.floor(Math.random()*perguntas.length);
document.getElementById("treinoTexto").innerText=perguntas[atual].t;
}

function responder(r){
total++;
let f=document.getElementById("feedbackTreino");

if(r===perguntas[atual].g){
acertos++;
f.innerHTML="✅ Acertou";
f.style.color="green";
}else{
f.innerHTML="❌ Errou";
f.style.color="red";
}

let p=Math.round((acertos/total)*100);
document.getElementById("barraProgresso").style.width=p+"%";
document.getElementById("textoProgresso").innerText=acertos+" de "+total;

setTimeout(novaPergunta,1500);
}

novaPergunta();

</script>

</body>
</html>
