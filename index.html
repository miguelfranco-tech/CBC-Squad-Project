<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>

/* ================= BASE ================= */
body{
font-family:Arial;
background:#eef4ff;
padding:20px;
text-align:center;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* ================= INPUT ================= */
textarea{
width:100%;
height:130px;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
resize:none;
}

/* ================= BOTÕES ================= */
button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;}

/* ================= RESULTADO ================= */
.result{
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:left;
animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.baixo{background:#e8f5e9;}
.medio{background:#fff8e1;}
.alto{background:#ffebee;}

.result h3{
font-size:22px;
margin-bottom:10px;
display:flex;
align-items:center;
gap:8px;
}

.result p{
margin:8px 0;
line-height:1.5;
font-size:15px;
}

/* ================= BARRA ================= */
.risk-bar{
width:100%;
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.risk-fill{
height:100%;
width:0%;
transition:width 0.7s ease;
}

.risk-low{background:#4caf50;}
.risk-medium{background:#ff9800;}
.risk-high{background:#f44336;}

/* ================= TREINO ================= */
.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:12px;
}

#placar{
margin-top:15px;
font-weight:bold;
}

/* ================= CENTRALIZAÇÃO ================= */
.actions{
display:flex;
flex-direction:column;
align-items:center;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="mensagem" placeholder="Digite uma mensagem suspeita"></textarea>

<div class="actions">
<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<div>
<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>
</div>
</div>

<div id="resultado" class="result"></div>

<!-- ================= PLACAR ================= -->
<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span>
</div>

<!-- ================= TREINAMENTO ================= -->
<div class="treino">

<h3>🎓 Treinamento para não cair em golpes</h3>

<p id="fraseTreino"></p>

<button onclick="responderTreino(true)">❌ É golpe</button>
<button onclick="responderTreino(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetPlacar()">🔄 Resetar treino</button>

</div>

</div>

<script>

/* ================= VARIÁVEIS ================= */
let acertos=0, erros=0, total=0;

/* ================= NORMALIZAR ================= */
function normalizar(txt){
return txt.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g,"");
}

/* ================= GRUPOS ================= */
const grupos={
dinheiro:["pix","dinheiro","transferencia","deposito"],
dados:["cpf","senha","codigo","cartao"],
urgencia:["urgente","agora","imediato","ja"],
acao:["mande","envie","clique","confirme"],
premio:["premio","ganhou"],
fake:["nova lei","governo liberou","compartilhe"]
};

/* ================= CONTAR ================= */
function contar(lista,texto){
return lista.filter(p=>texto.includes(p)).length;
}

/* ================= ANALISAR ================= */
function analisar(){

let input=document.getElementById("mensagem").value;
if(!input) return;

let texto=normalizar(input);
let risco=0;
let motivos=[];
let tipo="";

/* DETECÇÃO FORTE */
if(/pix.*urgente|mande.*pix/.test(texto)){
risco=95;
tipo="Golpe PIX urgente";
motivos.push("💰 Pedido de dinheiro com urgência");
}

if(/cpf|senha|codigo/.test(texto)){
risco=Math.max(risco,90);
tipo="Roubo de dados";
motivos.push("🔒 Pedido de dados sensíveis");
}

if(/ganhou|premio/.test(texto)){
risco+=30;
motivos.push("🎁 Promessa de prêmio");
}

/* fake news */
if(/nova lei|governo liberou|dinheiro facil/.test(texto)){
risco+=40;
tipo="Fake News";
motivos.push("📰 Informação duvidosa");
}

/* combos */
if(contar(grupos.acao,texto) && (contar(grupos.dados,texto)||contar(grupos.dinheiro,texto))){
risco=Math.max(risco,90);
motivos.push("⚠️ Ação + dado/dinheiro");
}

if(contar(grupos.urgencia,texto)>=2){
risco+=20;
motivos.push("⏰ Urgência excessiva");
}

if(risco>100) risco=100;
if(risco<5) risco=5;

/* NIVEL */
let nivel = risco<30?"🟢 Seguro":risco<70?"🟡 Atenção":"🔴 Alto risco";
let classe = risco<30?"baixo":risco<70?"medio":"alto";

let r=document.getElementById("resultado");
r.className="result "+classe;

/* TEXTO */
let explicacao =
risco>70?"Essa mensagem tem fortes sinais de golpe."
:risco>30?"Mensagem suspeita."
:"Mensagem aparentemente segura.";

let sinais = motivos.length?motivos.join("<br>"):"Nenhum sinal forte";

/* HTML FINAL */
let html = `
<h3>${nivel}</h3>

<div class="risk-bar">
<div class="risk-fill ${risco<30?"risk-low":risco<70?"risk-medium":"risk-high"}" style="width:${risco}%"></div>
</div>

<p><b>Risco:</b> ${risco}%</p>
<p><b>Tipo:</b> ${tipo||"Não identificado"}</p>
<p><b>Explicação:</b><br>${explicacao}</p>
<p><b>Sinais:</b><br>${sinais}</p>

<p><b>Como se proteger:</b><br>
• Não envie dinheiro<br>
• Não compartilhe dados<br>
• Confirme a informação
</p>
`;

/* DIGITAÇÃO */
digitar(r,html,5);

}

/* ================= DIGITAÇÃO ================= */
function digitar(el,texto,vel=5){
el.innerHTML="";
let i=0;
function t(){
if(i<texto.length){
el.innerHTML+=texto[i];
i++;
setTimeout(t,vel);
}
}
t();
}

/* ================= GERAR ================= */
function gerarMensagem(){
let msgs=[
"me manda pix urgente",
"envie seu cpf agora",
"ganhou premio clique",
"bom dia tudo bem"
];
document.getElementById("mensagem").value=
msgs[Math.floor(Math.random()*msgs.length)];
}

/* ================= EXEMPLOS ================= */
const exemplos={
banco:["Conta bloqueada confirme cpf"],
premio:["Você ganhou prêmio envie dados"],
fake:["Nova lei libera dinheiro"]
};

function exemplo(tipo){
let l=exemplos[tipo];
document.getElementById("mensagem").value=l[Math.floor(Math.random()*l.length)];
}

/* ================= TREINO ================= */
const treino=[
"me manda pix urgente",
"bom dia tudo bem",
"ganhou premio clique aqui",
"reunião às 14h"
];

let atual="";

function novaFrase(){
atual=treino[Math.floor(Math.random()*treino.length)];
document.getElementById("fraseTreino").innerText=atual;
document.getElementById("feedback").innerText="";
}

/* ================= RESPONDER ================= */
function responderTreino(resp){

let t=normalizar(atual);

let suspeita=/pix|cpf|senha|premio|urgente/.test(t);

let explicacao = suspeita
? "Essa mensagem contém sinais típicos de golpe."
: "Essa mensagem não apresenta sinais de golpe.";

if((resp && suspeita) || (!resp && !suspeita)){
acertos++;
}else{
erros++;
}

atualizarPlacar();

document.getElementById("feedback").innerHTML =
(resp && suspeita)||(!resp && !suspeita)
? "✅ Correto<br>"+explicacao+"<br><b>Dica:</b> sempre verifique antes."
: "❌ Errado<br>"+explicacao+"<br><b>Dica:</b> atenção a urgência e pedidos.";

setTimeout(novaFrase,7000);
}

/* ================= PLACAR ================= */
function atualizarPlacar(){
total=acertos+erros;
let p = total?Math.round((acertos/total)*100):0;

document.getElementById("acertos").innerText=acertos;
document.getElementById("erros").innerText=erros;
document.getElementById("total").innerText=total;
document.getElementById("precisao").innerText=p+"%";
}

/* ================= RESET ================= */
function resetPlacar(){
acertos=0;
erros=0;
atualizarPlacar();
}

/* ================= START ================= */
novaFrase();

</script>

</body>
</html>
