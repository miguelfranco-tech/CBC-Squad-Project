<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escudo Digital</title>

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ================= BODY ================= */

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#e3f2fd,#ffffff);
display:flex;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* ================= CONTAINER ================= */

.container{
width:100%;
max-width:950px;
}

/* ================= TÍTULO ================= */

h2{
text-align:center;
font-size:42px;
margin-bottom:25px;
color:#0d47a1;
}

/* ================= TEXTAREA ================= */

textarea{
width:100%;
height:150px;
padding:16px;
border-radius:14px;
border:2px solid #bbdefb;
font-size:17px;
resize:none;
outline:none;
transition:0.3s;
background:white;
}

textarea:focus{
border-color:#2196f3;
box-shadow:0 0 10px rgba(33,150,243,0.3);
}

/* ================= BOTÕES ================= */

.botoes{
display:flex;
justify-content:center;
gap:14px;
margin-top:20px;
flex-wrap:wrap;
}

button{
padding:14px 22px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:scale(1.05);
}

.primary{
background:#2196f3;
color:white;
}

.secondary{
background:#eef5ff;
color:#0d47a1;
}

/* ================= EXEMPLOS ================= */

.exemplos{
display:flex;
justify-content:center;
gap:14px;
margin-top:20px;
flex-wrap:wrap;
}

/* ================= RESULTADO ================= */

#resultado{
margin-top:25px;
}

.resultado-box{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
animation:fade .4s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ================= BARRA ================= */

.risk-bar{
width:100%;
height:14px;
background:#eceff1;
border-radius:20px;
overflow:hidden;
margin:18px 0;
}

.risk-fill{
height:100%;
border-radius:20px;
transition:1s;
}

/* ================= STATUS ================= */

.status{
font-size:30px;
font-weight:bold;
margin-bottom:15px;
}

/* ================= INFO ================= */

.info{
margin-top:10px;
line-height:1.7;
font-size:17px;
}

/* ================= TREINO ================= */

.treino{
margin-top:35px;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

.treino h3{
font-size:30px;
margin-bottom:18px;
color:#0d47a1;
}

.frase{
font-size:22px;
margin:20px 0;
font-weight:bold;
}

.acoesTreino{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
margin-top:15px;
}

.correct{
color:#2e7d32;
font-weight:bold;
font-size:18px;
}

.error{
color:#c62828;
font-weight:bold;
font-size:18px;
}

.feedback{
margin-top:18px;
font-size:18px;
line-height:1.6;
}

/* ================= RESPONSIVO ================= */

@media(max-width:700px){

h2{
font-size:30px;
}

textarea{
height:130px;
}

button{
width:100%;
}

.frase{
font-size:19px;
}

}

</style>
</head>

/* ================= SANITIZAR ================= */

function esc(str){

return str.replace(/[<>&"]/g,function(c){

return{
"<":"&lt;",
">":"&gt;",
"&":"&amp;",
'"':"&quot;"
}[c];

});

}

/* ================= NORMALIZAR ================= */

function normalizar(txt){

return txt.toLowerCase()

.replace(/0/g,"o")
.replace(/1/g,"i")
.replace(/3/g,"e")
.replace(/4/g,"a")
.replace(/5/g,"s")
.replace(/7/g,"t")

.normalize("NFD")

.replace(/[\u0300-\u036f]/g,"")

.replace(/[^\w\s]/g," ");

}

try{

const resultadoOCR =
await Tesseract.recognize(
arquivo,
"por"
