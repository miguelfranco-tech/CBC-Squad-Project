<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>

/* ================= BASE ================= */
body{
font-family:Arial;
background:#eef4ff;
padding:20px;
text-align:center;
}

/* ================= CONTAINER ================= */
.container{
max-width:750px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* ================= TEXTAREA CENTRAL ================= */
textarea{
display:block;
width:90%;
max-width:600px;
height:120px;
padding:10px;
border-radius:8px;
margin:0 auto 10px auto;
font-size:16px;
}

/* ================= BOTÕES ================= */
button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;}

/* ================= RESULT ================= */
.result{
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
opacity:0;
transform:translateY(10px);
transition:0.4s;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.baixo{background:#e8f5e9;}
.medio{background:#fffde7;}
.alto{background:#ffebee;}

/* ================= TREINO ================= */
.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:10px;
}

#placar{
margin-top:15px;
font-weight:bold;
}

/* ================= LOADING IA ================= */
#loadingIA{
display:none;
margin-top:15px;
}

.barra{
width:100%;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.barra-fill{
height:10px;
width:0%;
background:#1976d2;
transition:0.2s;
}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital</h2>

<textarea id="mensagem" placeholder="Digite a mensagem"></textarea>

<br>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<!-- LOADING -->
<div id="loadingIA">
<p id="textoIA">🤖 IA verificando mensagem...</p>
<div class="barra">
<div id="barraIA" class="barra-fill"></div>
</div>
</div>

<div id="resultado" class="result"></div>

<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span>
</div>

<div class="treino">

<h3>🎓 Treinamento para não cair em golpes</h3>

<p id="fraseTreino"></p>

<button onclick="responderTreino(true)">❌ É golpe</button>
<button onclick="responderTreino(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetPlacar()">🔄 Resetar treino</button>

</div>

</div>

<script>

// ================= VARIÁVEIS =================
let acertos=0, erros=0;

// ================= NORMALIZAR =================
function normalizar(txt){
return txt.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g,"");
}

// ================= CONTAR =================
function contar(lista,texto){
return lista.filter(p=>texto.includes(p)).length;
}

// ================= BASE DE DADOS =================
const palavras={
dinheiro:["pix","dinheiro","transferencia","deposito"],
dados:["cpf","senha","codigo","cartao"],
urgencia:["urgente","agora","ja","imediato"],
acao:["mande","envie","clique","confirme"],
premio:["premio","ganhou","beneficio"]
};

// ================= ANALISAR =================
function analisar(){

let input=document.getElementById("mensagem").value;
if(!input){
document.getElementById("resultado").innerHTML="Digite algo.";
return;
}

// mostrar loading
document.getElementById("loadingIA").style.display="block";
document.getElementById("resultado").classList.remove("show");

let barra=document.getElementById("barraIA");
let textoIA=document.getElementById("textoIA");

let progresso=0;

let intervalo=setInterval(()=>{

progresso+=10;
barra.style.width=progresso+"%";

if(progresso==30) textoIA.innerText="🔍 Analisando padrões...";
if(progresso==60) textoIA.innerText="🧠 Detectando comportamento...";
if(progresso==90) textoIA.innerText="⚠️ Calculando risco...";

if(progresso>=100){
clearInterval(intervalo);
document.getElementById("loadingIA").style.display="none";
executarAnalise(input);
}

},120);

}

// ================= EXECUÇÃO REAL =================
function executarAnalise(input){

let texto=normalizar(input);
let risco=0;
let motivos=[];

// detecção
if(contar(palavras.dinheiro,texto)){risco+=30;motivos.push("💰 dinheiro");}
if(contar(palavras.dados,texto)){risco+=40;motivos.push("🔒 dados");}
if(contar(palavras.urgencia,texto)){risco+=20;motivos.push("⏰ urgência");}
if(contar(palavras.acao,texto)){risco+=20;motivos.push("👉 ação");}
if(contar(palavras.premio,texto)){risco+=25;motivos.push("🎁 prêmio");}

// regra forte
if((texto.includes("pix")||texto.includes("cpf")) && texto.includes("urgente")){
risco=90;
motivos.push("combinação crítica");
}

// limites
if(risco>100) risco=100;
if(risco<5) risco=5;

// classe
let classe=risco<30?"baixo":risco<70?"medio":"alto";
let cor=risco>70?"red":risco>40?"orange":"green";

let resultadoTexto=`
${risco>70?"🔴 Alto risco":risco>40?"🟡 Atenção":"🟢 Seguro"}

Risco: ${risco}%

Sinais:
${motivos.join(", ") || "Nenhum forte"}

Recomendação:
Não envie dados ou dinheiro.
`;

let r=document.getElementById("resultado");
r.className="result "+classe;

// efeito digitação
digitarTexto(r, resultadoTexto, cor, risco);

}

// ================= DIGITAÇÃO =================
function digitarTexto(elemento,texto,cor,risco){

elemento.innerHTML="";
let i=0;

let intervalo=setInterval(()=>{

elemento.innerHTML += texto[i];
i++;

if(i>=texto.length){
clearInterval(intervalo);

// barra final
elemento.innerHTML+=`
<br><br>
<div class="barra">
<div style="width:${risco}%;height:10px;background:${cor};"></div>
</div>
`;

elemento.classList.add("show");

}

},20);

}

// ================= TREINO =================
const treino=[
"me manda pix urgente",
"bom dia",
"envie cpf agora",
"vamos sair"
];

let atual="";

function novaFrase(){
atual=treino[Math.floor(Math.random()*treino.length)];
document.getElementById("fraseTreino").innerText=atual;
}

function responderTreino(resp){

let suspeita=/(pix|cpf|urgente)/.test(atual);

if(resp===suspeita) acertos++;
else erros++;

let total=acertos+erros;
let precisao=Math.round((acertos/total)*100);

document.getElementById("acertos").innerText=acertos;
document.getElementById("erros").innerText=erros;
document.getElementById("total").innerText=total;
document.getElementById("precisao").innerText=precisao+"%";

document.getElementById("feedback").innerHTML=
(resp===suspeita?"✅ Correto":"❌ Errado");

setTimeout(novaFrase,7000);

}

function resetPlacar(){
acertos=0;erros=0;
document.getElementById("acertos").innerText=0;
document.getElementById("erros").innerText=0;
document.getElementById("total").innerText=0;
document.getElementById("precisao").innerText="0%";
}

// ================= GERAR =================
function gerarMensagem(){
let lista=[
"me manda pix urgente",
"bom dia",
"ganhou premio",
"envie cpf agora"
];
document.getElementById("mensagem").value=
lista[Math.floor(Math.random()*lista.length)];
}

// ================= EXEMPLOS =================
function exemplo(tipo){
const dados={
banco:["Conta bloqueada confirme CPF","Acesso suspeito"],
premio:["Você ganhou prêmio","Retire prêmio"],
fake:["Nova lei libera dinheiro","Governo liberou"]
};
let lista=dados[tipo];
document.getElementById("mensagem").value=
lista[Math.floor(Math.random()*lista.length)];
}

novaFrase();

</script>

</body>
</html>
