<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
font-family:Arial;
background:#eef4ff;
padding:20px;
text-align:center;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 🔥 ÚNICA ALTERAÇÃO AQUI */
textarea{
display:block;
width:100%;
max-width:600px;
height:120px;
padding:10px;
border-radius:8px;
margin:0 auto 10px auto;
font-size:16px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
}

.baixo{background:#e8f5e9;}
.medio{background:#fffde7;}
.alto{background:#ffebee;}

.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:10px;
}

#placar{
margin-top:15px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital</h2>

<textarea id="mensagem" placeholder="Digite a mensagem"></textarea>

<br>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado" class="result"></div>

<!-- ================= PLACAR ================= -->
<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span>
</div>

<!-- ================= TREINAMENTO ================= -->
<div class="treino">

<h3>🎓 Treinamento para não cair em golpes</h3>

<p id="fraseTreino"></p>

<button onclick="responderTreino(true)">❌ É golpe</button>
<button onclick="responderTreino(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetPlacar()">🔄 Resetar treino</button>

</div>

</div>

<script>

// ================= VARIÁVEIS =================
let acertos = 0;
let erros = 0;
let total = 0;

// ================= NORMALIZAR =================
function normalizar(txt){
return txt.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g,"");
}

// ================= CONTAR =================
function contar(lista,texto){
return lista.filter(p=>texto.includes(p)).length;
}

// ================= PESOS =================
const pesos = {
pix:25, dinheiro:20, transferencia:20,
cpf:30, senha:35, codigo:30,
urgente:15, agora:10,
premio:20, ganhou:20,
clique:15, envie:20, confirme:20,
banco:20, conta:20, bloqueado:25
};

// ================= GRUPOS =================
const grupos = {
dinheiro:["pix","dinheiro","transferencia","deposito"],
dados:["cpf","senha","codigo","cartao"],
urgencia:["urgente","agora","imediato","ja"],
acao:["mande","envie","clique","confirme"],
premio:["premio","ganhou","beneficio"],
banco:["banco","conta","bloqueado"]
};

// ================= FRASES =================
const frasesGolpe = [
"me manda pix urgente",
"conta bloqueada confirme cpf",
"ganhe dinheiro facil agora",
"envie codigo sms agora",
"clique para receber premio",
"troquei de numero me manda dinheiro"
];

// ================= EXEMPLOS =================
const exemplos = {
banco:[
"Conta bloqueada, confirme CPF",
"Acesso suspeito detectado"
],
premio:[
"Você ganhou prêmio, informe dados",
"Retire prêmio agora clicando"
],
fake:[
"Nova lei libera dinheiro fácil",
"Governo liberou dinheiro para todos"
]
};

// ================= GERAR =================
function gerarMensagem(){
let todas = [
...frasesGolpe,
"vamos sair amanhã",
"bom dia tudo bem",
"te ligo depois"
];
document.getElementById("mensagem").value =
todas[Math.floor(Math.random()*todas.length)];
}

// ================= EXEMPLO =================
function exemplo(tipo){
let lista = exemplos[tipo];
document.getElementById("mensagem").value =
lista[Math.floor(Math.random()*lista.length)];
}

// ================= ANALISAR =================
function analisar(){

let input = document.getElementById("mensagem").value;
if(!input){
document.getElementById("resultado").innerHTML="Digite uma mensagem.";
return;
}

let texto = normalizar(input);
let risco = 0;
let motivos = [];
let tipo = "";

// pesos
Object.keys(pesos).forEach(p=>{
if(texto.includes(p)){
risco += pesos[p];
}
});

// regex
if(/troquei.*numero.*(pix|dinheiro)/.test(texto)){
risco = 95;
tipo = "Golpe do falso número";
}

// dinheiro fácil
if(/dinheiro.*facil|ganhar.*facil/.test(texto)){
risco = Math.max(risco,85);
tipo = "Promessa de dinheiro fácil";
motivos.push("Promessa irreal");
}

// fake news
if(/nova lei|governo liberou/.test(texto)){
risco += 30;
tipo = "Fake News";
}

// combo perigoso
if(contar(grupos.acao,texto)>=1 &&
(contar(grupos.dados,texto)>=1 || contar(grupos.dinheiro,texto)>=1)){
risco = Math.max(risco,90);
motivos.push("Pedido direto de ação + dado/dinheiro");
}

// urgência
if(contar(grupos.urgencia,texto)>=2){
risco += 20;
motivos.push("Urgência");
}

// emoção
if(contar(["me ajuda","socorro","por favor"],texto)>=2){
risco += 25;
motivos.push("Pressão emocional");
}

// mensagem curta
if(texto.split(" ").length <=6 &&
(texto.includes("pix")||texto.includes("cpf"))){
risco += 25;
motivos.push("Mensagem curta suspeita");
}

// frases reais
frasesGolpe.forEach(f=>{
if(texto.includes(f)){
risco += 40;
motivos.push("Frase típica de golpe");
}
});

// trava
if((texto.includes("pix")||texto.includes("cpf")) && risco<40){
risco = 50;
}

if(risco>100) risco=100;
if(risco<5) risco=5;

let nivel =
risco<30?"🟢 Seguro":
risco<70?"🟡 Atenção":"🔴 Golpe";

let classe =
risco<30?"baixo":
risco<70?"medio":"alto";

let r = document.getElementById("resultado");
r.className="result "+classe;

r.innerHTML=`
<h3>${nivel}</h3>
<p><b>Risco:</b> ${risco}%</p>
<p><b>Tipo:</b> ${tipo||"Não identificado"}</p>

<p><b>Explicação:</b>
${risco>70 ? "Mensagem com fortes sinais de golpe." :
risco>30 ? "Mensagem suspeita, tenha cuidado." :
"Mensagem aparentemente segura."}
</p>

<p><b>Sinais:</b><br>
${motivos.join("<br>") || "Nenhum forte"}
</p>

<p><b>O que fazer agora:</b><br>
• Não envie dinheiro<br>
• Não informe dados pessoais<br>
• Não clique em links suspeitos
</p>
`;
}

// ================= PLACAR =================
function atualizarPlacar(){
total = acertos + erros;
let precisao = total > 0 ? Math.round((acertos / total) * 100) : 0;

document.getElementById("acertos").innerText = acertos;
document.getElementById("erros").innerText = erros;
document.getElementById("total").innerText = total;
document.getElementById("precisao").innerText = precisao + "%";
}

// ================= TREINO =================
const treino = [
"me manda pix urgente",
"vamos jantar amanhã",
"ganhe dinheiro fácil agora",
"bom dia tudo bem",
"envie código agora",
"te vejo mais tarde",
"clique para prêmio",
"reunião às 14h"
];

let atual = "";

// nova frase
function novaFrase(){
atual = treino[Math.floor(Math.random()*treino.length)];
document.getElementById("fraseTreino").innerText = atual;
document.getElementById("feedback").innerText = "";
}

// responder treino
function responderTreino(resp){

let texto = normalizar(atual);

let temDinheiro = /pix|dinheiro/.test(texto);
let temDados = /cpf|senha|codigo/.test(texto);
let temUrgencia = /urgente|agora/.test(texto);
let temAcao = /mande|envie|clique/.test(texto);
let temPremio = /premio|ganhou/.test(texto);

let suspeita = temDinheiro || temDados || temUrgencia || temAcao || temPremio;

let explicacao = [];

if(temDinheiro) explicacao.push("💰 Pedido de dinheiro");
if(temDados) explicacao.push("🔒 Pedido de dados");
if(temUrgencia) explicacao.push("⏰ Urgência");
if(temAcao) explicacao.push("👉 Pedido de ação");
if(temPremio) explicacao.push("🎁 Promessa de prêmio");

if(!suspeita){
explicacao.push("✔️ Sem sinais de golpe");
}

// lógica acerto
if(resp && suspeita){
acertos++;
}
else if(!resp && !suspeita){
acertos++;
}
else{
erros++;
}

// atualizar placar
atualizarPlacar();

// feedback
let fb = document.getElementById("feedback");

if(resp && suspeita){
fb.innerHTML = `✅ Correto!<br>${explicacao.join("<br>")}`;
}
else if(!resp && !suspeita){
fb.innerHTML = `✅ Correto!<br>${explicacao.join("<br>")}`;
}
else{
fb.innerHTML = `❌ Não exatamente<br>${explicacao.join("<br>")}`;
}

// próxima frase
setTimeout(novaFrase,2500);
}

// reset
function resetPlacar(){
acertos = 0;
erros = 0;
atualizarPlacar();
}

novaFrase();

</script>

</body>
</html>
