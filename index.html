<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Detector de Golpes</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    .container {
      text-align: center;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 500px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    #resultado {
      margin-top: 15px;
      text-align: left;
    }

    hr {
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Detector de Golpes 💻</h2>

  <textarea id="mensagem" placeholder="Digite a mensagem aqui..." rows="5"></textarea><br><br>

  <button onclick="analisar()">🔍 Analisar mensagem</button>

  <p id="resultado"></p>

</div>

<script>
function analisar() {

  let texto = document.getElementById("mensagem").value.toLowerCase();
  texto = texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

  let score = 0;
  let resultado = "";

  function detectar(lista, pontos, msg) {
    let count = 0;
    lista.forEach(p => {
      if (texto.includes(p)) count++;
    });

    if (count > 0) {
      score += pontos * count;
      resultado += msg + " (" + count + "x)<br>";
    }
  }

  // 🟢 BAIXO RISCO (diminui score)
  detectar([
    "reuniao","relatorio","agenda","confirmacao","horario","envio",
    "documento","atualizacao","conversa","reuniao marcada",
    "acompanhamento","atendimento","suporte","informacao","contato"
  ], -1, "🟢 Linguagem comum");

  // 🟠 RISCO LEVE
  detectar([
    "oportunidade","novidade","beneficio","destaque","recomendacao",
    "sugestao","interessante","exclusivo","vantagem","confira",
    "veja isso","pode gostar","talvez","vale a pena","oportunidade unica"
  ], 1, "🟠 Marketing leve");

  // 🟡 MÉDIO RISCO
  detectar([
    "imperdivel","acesso imediato","ativacao","liberacao",
    "confirmacao pendente","verificacao necessaria","desbloqueio",
    "validacao","acao necessaria","solicitacao urgente",
    "atualizacao obrigatoria","revisao de conta","tentativa de acesso",
    "alerta de seguranca","sessao expirada"
  ], 3, "🟡 Alerta suspeito");

  // 🔴 ALTO RISCO
  detectar([
    "bloqueio imediato","conta comprometida","invasao detectada",
    "transferencia suspeita","saque nao autorizado",
    "codigo de seguranca","token","autenticacao",
    "redefinir senha","dados bancarios","numero do cartao",
    "chave pix","verificacao bancaria",
    "confirmacao de identidade","acesso nao autorizado"
  ], 5, "🔴 Alto risco");

  // 🎲 frases
  function aleatorio(lista) {
    return lista[Math.floor(Math.random() * lista.length)];
  }

  let baixo = ["🟢 Parece seguro."];
  let leve = ["🟠 Pequenos sinais de atenção."];
  let medio = ["🟡 Cuidado! Pode ser golpe."];
  let alto = ["🔴 ALTO RISCO DE GOLPE!"];

  let nivel = "";

  if (score >= 10) nivel = aleatorio(alto);
  else if (score >= 5) nivel = aleatorio(medio);
  else if (score > 0) nivel = aleatorio(leve);
  else nivel = aleatorio(baixo);

  // 🎨 cor
  let cor = "green";
  if (score >= 10) cor = "red";
  else if (score >= 5) cor = "orange";
  else if (score > 0) cor = "#e6b800";

  if (resultado === "") {
    resultado = "✅ Nenhum padrão suspeito encontrado.<br>";
  }

  document.getElementById("resultado").innerHTML =
    resultado +
    "<hr>" +
    "<b style='color:" + cor + "'>Pontuação: " + score + "<br>" + nivel + "</b>";
}
</script>

</body>
</html>
