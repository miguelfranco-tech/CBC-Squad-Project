<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>
body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eef4ff,#dfe9ff);
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:140px;
padding:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
resize:none;
margin-bottom:10px;
}

button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

button:hover{transform:scale(1.05);}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;}

.result{
margin-top:20px;
padding:20px;
border-radius:14px;
text-align:left;
animation:fadeIn 0.4s ease;
min-height:120px;
}

.baixo{background:#e8f5e9;}
.medio{background:#fff8e1;}
.alto{background:#ffebee;}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.risk-bar{
width:100%;
height:12px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.risk-fill{
height:100%;
width:0%;
transition:1s ease;
}

.low{background:#4caf50;}
.medium{background:#ff9800;}
.high{background:#f44336;}

.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:12px;
}

#placar{
margin-top:15px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="mensagem" placeholder="Digite uma mensagem suspeita..."></textarea>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado" class="result"></div>

<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span>
</div>

<div class="treino">
<h3>🎓 Treinamento</h3>
<p id="fraseTreino"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✅ Seguro</button>

<p id="feedback"></p>
<button onclick="reset()">🔄 Resetar</button>
</div>

</div>

<script>

/* ================= NORMALIZAÇÃO ================= */
function normalizar(t){
return t.toLowerCase()
.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
.replace(/[0]/g,"o")
.replace(/[1]/g,"i")
.replace(/[3]/g,"e")
.replace(/[4]/g,"a")
.replace(/[5]/g,"s")
.replace(/[7]/g,"t")
.replace(/[@]/g,"a")
.replace(/[^a-z0-9\s]/g,"");
}

/* ================= DIGITAÇÃO SEGURA ================= */
function digitar(id,texto){
let el=document.getElementById(id);
el.innerText="";
let i=0;

let intervalo=setInterval(()=>{
if(i<texto.length){
el.innerText+=texto[i];
i++;
}else{
clearInterval(intervalo);
}
},20);
}

/* ================= ANALISAR ================= */
function analisar(){

let input=document.getElementById("mensagem").value.trim();
if(!input) return;

let texto=normalizar(input);

let risco=0;
let sinais=new Set();
let tipo="";

/* padrões fortes */
const fortes=[
/pix.*(urgente|agora)/,
/(envie|mande).*pix/,
/envie.*(cpf|senha|codigo)/,
/ganhou.*(premio|dinheiro)/,
/clique.*(receber|resgatar)/,
/troquei.*numero.*(pix|dinheiro)/
];

let forteDetectado=false;

fortes.forEach(p=>{
if(p.test(texto)){
forteDetectado=true;
}
});

/* grupos */
const dinheiro=["pix","dinheiro","transferencia"];
const dados=["cpf","senha","codigo"];
const urgencia=["urgente","agora","imediato"];
const acao=["mande","envie","clique"];
const premio=["premio","ganhou"];
const emocional=["socorro","me ajuda","por favor"];

function contar(lista){
return lista.filter(p=>texto.includes(p)).length;
}

let cDin=contar(dinheiro);
let cDados=contar(dados);
let cUrg=contar(urgencia);
let cAcao=contar(acao);
let cPremio=contar(premio);
let cEmoc=contar(emocional);

/* pontuação */
risco += cDin*30;
if(cDin) sinais.add("💰 Dinheiro");

risco += cDados*35;
if(cDados) sinais.add("🔒 Dados");

risco += cUrg*15;
if(cUrg) sinais.add("⏰ Urgência");

risco += cAcao*15;
if(cAcao) sinais.add("👉 Ação");

risco += cPremio*20;
if(cPremio) sinais.add("🎁 Prêmio");

risco += cEmoc*15;
if(cEmoc) sinais.add("😨 Emoção");

/* combos */
if(cDin && cUrg){risco+=35; sinais.add("⚠️ Dinheiro + urgência");}
if(cAcao && cDados){risco+=40; sinais.add("⚠️ Ação + dados");}
if(cPremio && cAcao){risco+=30; sinais.add("⚠️ Prêmio + ação");}

/* fake */
if(/nova lei|governo liberou|compartilhe/.test(texto)){
risco+=40;
tipo="Fake News";
sinais.add("📰 Fake news");
}

/* trava forte */
if(forteDetectado){
risco = Math.max(risco,95);
tipo="Golpe direto";
sinais.add("🚨 Padrão clássico");
}

/* limites */
risco=Math.max(5,Math.min(risco,100));

/* nível */
let nivel,classe,cor;

if(risco<30){nivel="🟢 Seguro";classe="baixo";cor="low";}
else if(risco<70){nivel="🟡 Atenção";classe="medio";cor="medium";}
else{nivel="🔴 Golpe";classe="alto";cor="high";}

/* render */
let r=document.getElementById("resultado");
r.className="result "+classe;

r.innerHTML=`
<h3>${nivel}</h3>

<div class="risk-bar">
<div id="barra" class="risk-fill ${cor}"></div>
</div>

<p><b>Risco:</b> ${risco}%</p>
<p id="explicacao"></p>

<p><b>Sinais:</b><br>${[...sinais].join("<br>")}</p>

<p><b>Como se proteger:</b><br>
• Não envie dinheiro sob pressão<br>
• Não compartilhe dados pessoais<br>
• Confirme com a pessoa real
</p>
`;

setTimeout(()=>{
let barra=document.getElementById("barra");
if(barra) barra.style.width=risco+"%";
},50);

/* explicação */
let explicacao=
risco>80?"Fortes sinais de golpe detectados.":
risco>50?"Mensagem suspeita.":
"Sem sinais fortes.";

digitar("explicacao",explicacao);

}

/* ================= TREINO ================= */
const treino=[
"me manda pix urgente",
"bom dia tudo bem",
"ganhou premio clique aqui",
"reunião às 14h"
];

let atual="";
let acertos=0,erros=0;

function nova(){
atual=treino[Math.floor(Math.random()*treino.length)];
document.getElementById("fraseTreino").innerText=atual;
document.getElementById("feedback").innerText="";
}

function responder(resp){

let texto=normalizar(atual);
let golpe=/pix|premio|cpf|urgente/.test(texto);

let certo=(resp && golpe)||(!resp && !golpe);

if(certo) acertos++;
else erros++;

atualizar();

document.getElementById("feedback").innerHTML=
certo?"✅ Correto!":"❌ Errado!";

setTimeout(nova,7000);
}

function atualizar(){
let total=acertos+erros;
let p=total?Math.round((acertos/total)*100):0;

document.getElementById("acertos").innerText=acertos;
document.getElementById("erros").innerText=erros;
document.getElementById("total").innerText=total;
document.getElementById("precisao").innerText=p+"%";
}

function reset(){
acertos=0;erros=0;atualizar();
}

/* ================= UTIL ================= */
function gerarMensagem(){
let msgs=[
"me manda pix urgente",
"envie seu cpf agora",
"ganhou premio clique",
"bom dia"
];
document.getElementById("mensagem").value=
msgs[Math.floor(Math.random()*msgs.length)];
}

function exemplo(tipo){
const ex={
banco:["Conta bloqueada confirme cpf"],
premio:["Você ganhou prêmio clique"],
fake:["Nova lei libera dinheiro"]
};
document.getElementById("mensagem").value=ex[tipo][0];
}

/* iniciar */
nova();

</script>

</body>
</html>
