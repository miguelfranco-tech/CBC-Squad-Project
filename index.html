<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#e0f2fe,#f8fafc);
  text-align:center;
  padding:20px;
}

.container{
  max-width:750px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{ color:#0284c7; }

.descricao{
  color:#64748b;
  font-size:14px;
  margin-bottom:15px;
}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  border:2px solid #cbd5e1;
  background:#f1f5f9;
  pointer-events:none; /* trava total */
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(135deg,#38bdf8,#0284c7);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{ transform:scale(1.05); }

#resultado{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#f8fafc;
  display:none;
}

#barraContainer{
  background:#e2e8f0;
  border-radius:10px;
  margin-top:10px;
}

#barra{
  height:20px;
  border-radius:10px;
  width:0%;
  transition:0.8s;
}

#dicas{
  display:none;
  background:#fef3c7;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>
<p class="descricao">
Detecta golpes, fake news e tentativas de manipulação digital com base em padrões reais.
</p>

<textarea id="mensagem" readonly placeholder="Escolha um exemplo abaixo..."></textarea>

<br>
<button onclick="analisar()">🔍 Analisar</button>

<div id="barraContainer">
  <div id="barra"></div>
</div>

<div id="resultado"></div>

<h3>Exemplos de golpes</h3>

<button onclick="exemplo('premio')">🎁 Golpe de premiação</button>
<button onclick="exemplo('banco')">🏦 Golpe bancário</button>
<button onclick="exemplo('fake')">📢 Fake news</button>

<br><br>
<button onclick="toggleDicas()">💡 Dicas de segurança</button>

<div id="dicas">
<p>✔ Nunca envie códigos recebidos por SMS</p>
<p>✔ Desconfie de urgência</p>
<p>✔ Não clique em links desconhecidos</p>
<p>✔ Bancos nunca pedem senha por mensagem</p>
</div>

</div>

<script>

function normalizar(t){
return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// RESET VISUAL
function resetUI(){
document.getElementById("resultado").style.display="none";
document.getElementById("barra").style.width="0%";
}

// EXEMPLOS
function exemplo(t){

resetUI();

let m="";

if(t=="premio") m="Parabéns! Você ganhou um prêmio exclusivo, clique agora!";
if(t=="banco") m="Sua conta foi invadida, envie o código urgente para evitar bloqueio!";
if(t=="fake") m="Compartilhe isso agora antes que seja apagado! A mídia não mostra essa verdade!";

document.getElementById("mensagem").value = m;

analisar();
}

// ANALISAR
function analisar(){

let texto = normalizar(document.getElementById("mensagem").value);

if(!texto.trim()){
alert("Escolha um exemplo primeiro.");
return;
}

let score=0;
let motivos=[];
let explicacao=[];
let intencao=[];

// 🔴 FAKE NEWS
if(/compartilh|repasse|divulg/.test(texto)){
score+=6;
motivos.push("📢 Incentivo ao compartilhamento em massa");
intencao.push("desinformação");
}

if(/apag|censur|midia nao mostra|vao apagar/.test(texto)){
score+=8;
explicacao.push("Cria sensação de informação escondida");
}

if(/verdade|comprovad/.test(texto)){
score+=4;
}

// 🔒 DADOS
if(/pix|senha|codigo|cartao|cvv/.test(texto)){
score+=7;
motivos.push("🔒 Pedido de dados sensíveis");
intencao.push("financeiro");
}

// ⚠️ URGÊNCIA
if(/urgente|agora|imediato|nao perca/.test(texto)){
score+=5;
motivos.push("⚠️ Pressão psicológica");
}

// 🔗 LINKS
if(/http|www|\.com|\.br/.test(texto)){
score+=4;
motivos.push("🔗 Link suspeito");
}

// 🧠 MEDO
if(/invadida|bloqueada|perigo|problema/.test(texto)){
score+=5;
explicacao.push("Uso de medo para manipular");
}

// 💰 GANHO
if(/ganhe|premio|lucro/.test(texto)){
score+=4;
explicacao.push("Promessa de recompensa");
}

// 💥 COMBINAÇÕES INTELIGENTES
if(texto.includes("pix") && texto.includes("urgente")){
score+=12;
explicacao.push("Combinação forte de golpe financeiro");
}

if(/compartilh/.test(texto) && /apag|midia/.test(texto)){
score+=12;
explicacao.push("Padrão clássico de fake news");
}

// fallback
if(score === 0){
motivos.push("Nenhum comportamento suspeito identificado");
explicacao.push("Mensagem aparentemente normal");
}

// 📊 RESULTADO
let porcentagem = Math.min(100, score * 10);

let barra = document.getElementById("barra");
barra.style.width = porcentagem + "%";

if(porcentagem<30) barra.style.background="green";
else if(porcentagem<70) barra.style.background="orange";
else barra.style.background="red";

// NÍVEL
let nivel="";
if(porcentagem>=70) nivel="🔴 ALTO RISCO";
else if(porcentagem>=40) nivel="🟡 MÉDIO RISCO";
else nivel="🟢 BAIXO RISCO";

// FRASES HUMANAS
let frase="";
if(porcentagem>=70){
frase=["⚠️ Isso aqui está com cara de golpe!",
"🚨 Melhor não confiar nessa mensagem!",
"❌ Algo está claramente errado aqui"][Math.floor(Math.random()*3)];
}
else if(porcentagem>=40){
frase=["🤔 Algo não está certo aqui...",
"⚠️ Fique atento a essa mensagem",
"🧐 Pode ser suspeito"][Math.floor(Math.random()*3)];
}
else{
frase=["🙂 Parece seguro",
"✔ Nenhum risco forte detectado",
"👍 Mensagem comum"][Math.floor(Math.random()*3)];
}

// RESULTADO
let res = document.getElementById("resultado");

res.style.display="block";

res.innerHTML =
"<b>"+nivel+" ("+porcentagem+"%)</b><br><br>"+
frase+"<br><br>"+
"<b>🎯 Intenção:</b> "+(intencao.join(", ")||"Não identificada")+"<br><br>"+
"<b>⚠️ Motivos:</b><br>"+motivos.join("<br>")+"<br><br>"+
"<b>💬 Explicação:</b><br>"+explicacao.join("<br>")+
"<br><br><small>⚠️ Análise baseada em padrões comuns de golpes digitais.</small>";

}

// DICAS
function toggleDicas(){
let d=document.getElementById("dicas");
d.style.display=d.style.display==="block"?"none":"block";
}

</script>

</body>
</html>
