<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escudo Digital IA - Finalista</title>

<style>

/* ================= BASE ================= */

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#eef4ff,#dfe9ff);
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* ================= INPUT ================= */

textarea{
width:100%;
height:140px;
border-radius:10px;
padding:12px;
font-size:16px;
border:2px solid #d0d8ff;
resize:none;
}

/* ================= BOTÕES ================= */

button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

.primary{
background:#1976d2;
color:white;
}

.primary:hover{
background:#1258a8;
}

.secondary{
background:#e3f2fd;
}

.secondary:hover{
background:#cde7ff;
}

/* ================= RESULT ================= */

.result{
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:left;
opacity:0;
transform:translateY(10px);
transition:0.5s;
}

.show{
opacity:1;
transform:translateY(0);
}

.baixo{background:#e8f5e9;}
.medio{background:#fff8e1;}
.alto{background:#ffebee;}

/* ================= BARRA ================= */

.risk-bar{
width:100%;
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.risk-fill{
height:100%;
width:0%;
transition:1s;
}

.low{background:#4caf50;}
.medium{background:#ff9800;}
.high{background:#f44336;}

/* ================= TREINO ================= */

.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:12px;
}

#feedback{
margin-top:10px;
min-height:50px;
font-size:14px;
}

#placar{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="mensagem" placeholder="Digite uma mensagem suspeita..."></textarea>

<br>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerar()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado" class="result"></div>

<!-- ================= PLACAR ================= -->

<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span>
</div>

<!-- ================= TREINO ================= -->

<div class="treino">

<h3>🎓 Treinamento Inteligente</h3>

<p id="fraseTreino"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="reset()">🔄 Resetar</button>

</div>

</div>

<script>

/* ================= NORMALIZAR ================= */

function norm(t){
return t.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g,"");
}

/* ================= IA DETECÇÃO ================= */

function analisar(){

let input = document.getElementById("mensagem").value;
if(!input) return;

let t = norm(input);

let risco = 0;
let sinais = [];

/* PIX / DINHEIRO */
if(/pix|transferencia|dinheiro/.test(t)){
risco += 30;
sinais.push("💰 Pedido de dinheiro");
}

/* DADOS */
if(/cpf|senha|codigo|cartao/.test(t)){
risco += 35;
sinais.push("🔒 Pedido de dados");
}

/* URGÊNCIA */
if(/urgente|agora|imediato|ja/.test(t)){
risco += 20;
sinais.push("⏰ Urgência");
}

/* AÇÃO */
if(/clique|envie|confirme|mande/.test(t)){
risco += 20;
sinais.push("👉 Pedido de ação");
}

/* PRÊMIO */
if(/ganhou|premio|beneficio/.test(t)){
risco += 25;
sinais.push("🎁 Promessa suspeita");
}

/* COMBO FORTE */
if(/pix/.test(t) && /urgente/.test(t)){
risco = 95;
}

/* FAKE NEWS FORTE */
if(/governo liberou|nova lei|urgente noticia/.test(t)){
risco += 40;
sinais.push("📰 Possível fake news");
}

/* LIMITE */
if(risco>100) risco=100;

/* NIVEL */
let nivel = risco<30?"🟢 Seguro":
risco<70?"🟡 Atenção":"🔴 Golpe";

let classe = risco<30?"baixo":
risco<70?"medio":"alto";

/* COR BARRA */
let cor = risco<30?"low":
risco<70?"medium":"high";

/* RESULT HTML */
let html = `
<h3>${nivel}</h3>

<div class="risk-bar">
<div class="risk-fill ${cor}" style="width:${risco}%"></div>
</div>

<p><b>Risco:</b> ${risco}%</p>

<p><b>Sinais:</b><br>${sinais.join("<br>") || "Nenhum forte"}</p>

<p><b>Explicação:</b><br>
${risco>70?"Mensagem com fortes características de golpe.":
risco>30?"Mensagem suspeita, cuidado.":
"Mensagem aparentemente segura."}
</p>

<p><b>Como evitar:</b><br>
• Nunca envie dinheiro sob pressão<br>
• Não compartilhe dados pessoais<br>
• Confirme a informação por outro canal
</p>
`;

let box = document.getElementById("resultado");
box.className="result "+classe;
box.innerHTML="";
box.classList.add("show");

/* EFEITO DIGITAÇÃO */
let i=0;
let speed=10;

function digitar(){
if(i < html.length){
box.innerHTML += html.charAt(i);
i++;
setTimeout(digitar,speed);
}
}

digitar();

}

/* ================= GERAR ================= */

function gerar(){
let msgs = [
"me manda pix urgente preciso agora",
"vamos sair amanhã tranquilo",
"você ganhou prêmio clique aqui para resgatar",
"reunião marcada para amanhã às 14h",
"governo liberou dinheiro para todos urgente veja",
"troquei de número me manda dinheiro"
];
document.getElementById("mensagem").value =
msgs[Math.floor(Math.random()*msgs.length)];
}

/* ================= EXEMPLOS ================= */

function exemplo(t){
let banco=[
"Conta bloqueada confirme seu CPF imediatamente",
"Acesso suspeito detectado clique para verificar"
];

let premio=[
"Você ganhou prêmio clique aqui para receber agora",
"Parabéns você foi selecionado informe seus dados"
];

let fake=[
"Nova lei libera dinheiro para toda população urgente",
"Governo vai pagar benefício para todos confira agora"
];

let map={banco,premio,fake};

document.getElementById("mensagem").value =
map[t][Math.floor(Math.random()*map[t].length)];
}

/* ================= TREINO ================= */

let frases=[
"me manda pix urgente estou precisando agora",
"reunião amanhã às 14h na escola",
"você ganhou prêmio clique aqui para resgatar agora",
"bom dia tudo bem com você?",
"governo liberou dinheiro para todos urgente veja",
"envie seu código de verificação imediatamente"
];

let atual="";

/* NOVA FRASE */
function nova(){
atual = frases[Math.floor(Math.random()*frases.length)];
document.getElementById("fraseTreino").innerText = atual;
document.getElementById("feedback").innerText="";
}

nova();

/* RESPONDER */
let acertos=0, erros=0;

function responder(resp){

let t = norm(atual);

let suspeito =
/pix|codigo|cpf|senha|premio|urgente|clique|dinheiro|governo/.test(t);

let correto =
(resp && suspeito) || (!resp && !suspeito);

let fb = document.getElementById("feedback");

/* EXPLICAÇÃO COMPLETA */
if(correto){
acertos++;
fb.innerHTML = "✅ Correto!<br>Essa mensagem foi classificada corretamente porque apresenta ou não sinais claros de golpe.";
}else{
erros++;
fb.innerHTML = "❌ Errado!<br>Revise os sinais como urgência, pedido de dados ou promessa de dinheiro.";
}

/* ATUALIZA */
let total = acertos+erros;
let prec = Math.round((acertos/total)*100);

document.getElementById("acertos").innerText=acertos;
document.getElementById("erros").innerText=erros;
document.getElementById("total").innerText=total;
document.getElementById("precisao").innerText=prec+"%";

/* ESPERA 7s */
setTimeout(nova,7000);

}

/* RESET */
function reset(){
acertos=0;
erros=0;
document.getElementById("acertos").innerText=0;
document.getElementById("erros").innerText=0;
document.getElementById("total").innerText=0;
document.getElementById("precisao").innerText="0%";
nova();
}

</script>

</body>
</html>
