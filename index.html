<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escudo Digital</title>

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ================= BODY ================= */

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#e3f2fd,#ffffff);
display:flex;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* ================= CONTAINER ================= */

.container{
width:100%;
max-width:950px;
}

/* ================= TÍTULO ================= */

h2{
text-align:center;
font-size:42px;
margin-bottom:25px;
color:#0d47a1;
}

/* ================= TEXTAREA ================= */

textarea{
width:100%;
height:150px;
padding:16px;
border-radius:14px;
border:2px solid #bbdefb;
font-size:17px;
resize:none;
outline:none;
transition:0.3s;
background:white;
}

textarea:focus{
border-color:#2196f3;
box-shadow:0 0 10px rgba(33,150,243,0.3);
}

/* ================= BOTÕES ================= */

.botoes{
display:flex;
justify-content:center;
gap:14px;
margin-top:20px;
flex-wrap:wrap;
}

button{
padding:14px 22px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:scale(1.05);
}

.primary{
background:#2196f3;
color:white;
}

.secondary{
background:#eef5ff;
color:#0d47a1;
}

/* ================= EXEMPLOS ================= */

.exemplos{
display:flex;
justify-content:center;
gap:14px;
margin-top:20px;
flex-wrap:wrap;
}

/* ================= RESULTADO ================= */

#resultado{
margin-top:25px;
}

.resultado-box{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
animation:fade .4s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ================= BARRA ================= */

.risk-bar{
width:100%;
height:14px;
background:#eceff1;
border-radius:20px;
overflow:hidden;
margin:18px 0;
}

.risk-fill{
height:100%;
border-radius:20px;
transition:1s;
}

/* ================= STATUS ================= */

.status{
font-size:30px;
font-weight:bold;
margin-bottom:15px;
}

/* ================= INFO ================= */

.info{
margin-top:10px;
line-height:1.7;
font-size:17px;
}

/* ================= TREINO ================= */

.treino{
margin-top:35px;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
}

.treino h3{
font-size:30px;
margin-bottom:18px;
color:#0d47a1;
}

.frase{
font-size:22px;
margin:20px 0;
font-weight:bold;
}

.acoesTreino{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
margin-top:15px;
}

.correct{
color:#2e7d32;
font-weight:bold;
font-size:18px;
}

.error{
color:#c62828;
font-weight:bold;
font-size:18px;
}

.feedback{
margin-top:18px;
font-size:18px;
line-height:1.6;
}

/* ================= RESPONSIVO ================= */

@media(max-width:700px){

h2{
font-size:30px;
}

textarea{
height:130px;
}

button{
width:100%;
}

.frase{
font-size:19px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital</h2>

<textarea
id="entrada"
placeholder="Digite ou cole uma mensagem suspeita aqui..."
></textarea>

<div class="botoes">

<button class="primary" onclick="analisar()">
🔍 Analisar
</button>

<button class="secondary" onclick="gerar()">
✨ Gerar
</button>

</div>

<div class="exemplos">

<button class="secondary" onclick="exemplo('banco')">
🏦 Golpe Bancário
</button>

<button class="secondary" onclick="exemplo('premio')">
🎁 Golpe de Prêmio
</button>

<button class="secondary" onclick="exemplo('fake')">
📰 Fake News
</button>

</div>

<div id="resultado"></div>

<!-- ================= TREINAMENTO ================= -->

<div class="treino">

<h3>🎓 Treinamento Inteligente</h3>

<p class="frase" id="fraseTreino"></p>

<div class="acoesTreino">

<button onclick="responder(true)">
❌ É golpe
</button>

<button onclick="responder(false)">
✅ É seguro
</button>

</div>

<div class="feedback" id="feedback"></div>

<br>

<button class="secondary" onclick="resetTreino()">
🔄 Resetar
</button>

</div>

</div>

<script>

/* ================= SANITIZAR ================= */

function esc(str){

return str.replace(/[<>&"]/g,function(c){

return{
"<":"&lt;",
">":"&gt;",
"&":"&amp;",
'"':"&quot;"
}[c];

});

}

/* ================= NORMALIZAR ================= */

function normalizar(txt){

return txt.toLowerCase()

.replace(/0/g,"o")
.replace(/1/g,"i")
.replace(/3/g,"e")
.replace(/4/g,"a")
.replace(/5/g,"s")
.replace(/7/g,"t")

.normalize("NFD")

.replace(/[\u0300-\u036f]/g,"")

.replace(/[^\w\s]/g," ");

}

/* ================= IA ================= */

function analisarMensagem(texto){

texto = normalizar(texto);

let risco = 0;

let sinais = [];

/* ================= DETECÇÃO ================= */

if(/\b(urgente|agora|imediatamente|rapido|ja)\b/.test(texto)){
risco += 25;
sinais.push("Mensagem com urgência");
}

if(/\b(pix|dinheiro|transferencia|deposito)\b/.test(texto)){
risco += 25;
sinais.push("Pedido financeiro");
}

if(/\b(codigo|senha|cpf|dados|confirmacao)\b/.test(texto)){
risco += 35;
sinais.push("Solicitação de dados");
}

if(/\b(clique|acesse|link|http)\b/.test(texto)){
risco += 20;
sinais.push("Tentativa de redirecionamento");
}

if(/\b(premio|beneficio|ganhou|sorteio)\b/.test(texto)){
risco += 20;
sinais.push("Promessa de prêmio");
}

if(/\b(banco|central|suporte)\b/.test(texto)){
risco += 15;
sinais.push("Uso de autoridade");
}

if(/\b(me ajuda|socorro|mae)\b/.test(texto)){
risco += 15;
sinais.push("Pressão emocional");
}

/* ================= COMBINAÇÕES ================= */

if(
/pix/.test(texto) &&
/urgente|agora/.test(texto)
){
risco = 95;
}

if(
/codigo|senha/.test(texto) &&
/envie|mande/.test(texto)
){
risco = 98;
}

if(
/premio/.test(texto) &&
/clique|link/.test(texto)
){
risco = 90;
}

/* ================= REDUÇÃO ================= */

if(
/bom dia|boa tarde|reuniao|obrigado|ate mais/.test(texto)
){
risco -= 20;
}

if(risco < 0){
risco = 0;
}

if(risco > 100){
risco = 100;
}

/* ================= NÍVEL ================= */

let nivel = "";
let explicacao = "";
let cor = "";

if(risco >= 90){

nivel = "🔴 Alto risco";
cor = "#f44336";

explicacao =
"Essa mensagem apresenta fortes sinais de golpe digital, incluindo pressão, urgência ou solicitação sensível.";

}else if(risco >= 60){

nivel = "🟠 Muito suspeito";
cor = "#ff9800";

explicacao =
"A mensagem contém padrões frequentemente utilizados em golpes e exige atenção.";

}else if(risco >= 30){

nivel = "🟡 Atenção";
cor = "#fbc02d";

explicacao =
"Existem sinais suspeitos que merecem verificação antes de qualquer ação.";

}else{

nivel = "🟢 Seguro";
cor = "#4caf50";

explicacao =
"Aparentemente a mensagem não possui sinais fortes de golpe.";

}

return{
risco,
nivel,
explicacao,
sinais,
cor
};

}

/* ================= ANALISAR ================= */

function analisar(){

let entrada =
document.getElementById("entrada").value;

if(!entrada){

alert("Digite uma mensagem!");

return;

}

let r = analisarMensagem(entrada);

document.getElementById("resultado").innerHTML = `

<div class="resultado-box">

<div class="status">
${r.nivel}
</div>

<div class="risk-bar">

<div
class="risk-fill"
style="width:${r.risco}%;background:${r.cor}"
></div>

</div>

<div class="info">

<p>
<b>Risco:</b> ${r.risco}%
</p>

<br>

<p>
<b>Explicação:</b><br>
${esc(r.explicacao)}
</p>

<br>

<p>
<b>Sinais detectados:</b><br>
${
r.sinais.length
?
r.sinais.map(s=>"• "+esc(s)).join("<br>")
:
"Nenhum sinal forte identificado."
}
</p>

<br>

<p>
<b>Como se proteger:</b><br>
• Não envie dinheiro imediatamente<br>
• Nunca compartilhe códigos ou senhas<br>
• Confirme informações por outro canal<br>
• Desconfie de pressão emocional
</p>

</div>

</div>

`;

}

/* ================= GERAR ================= */

function gerar(){

const gerados = [

"URGENTE! Detectamos uma movimentação suspeita na sua conta. Confirme seu código imediatamente.",

"Parabéns! Você ganhou um prêmio exclusivo hoje. Clique no link para liberar o benefício.",

"Mãe, troquei de número. Me manda um PIX urgente porque estou sem acesso ao banco.",

"Seu CPF será bloqueado ainda hoje caso você não confirme seus dados agora.",

"Seu acesso bancário expirou. Faça a atualização imediatamente para evitar bloqueio.",

"Última chance para resgatar seu benefício liberado pelo governo hoje."

];

document.getElementById("entrada").value =
gerados[Math.floor(Math.random()*gerados.length)];

}

/* ================= EXEMPLOS ================= */

function exemplo(tipo){

const ex={

banco:[

"Detectamos acesso suspeito na sua conta. Envie o código recebido por SMS.",

"Seu banco identificou atividade incomum. Confirme imediatamente seu CPF.",

"Conta temporariamente bloqueada. Atualize seus dados para continuar usando."

],

premio:[

"Parabéns! Você ganhou um prêmio exclusivo. Clique para resgatar agora.",

"Seu benefício foi aprovado hoje. Faça a confirmação imediatamente.",

"Você foi sorteado em nossa promoção. Envie seus dados para liberar o prêmio."

],

fake:[

"Nova lei libera dinheiro para toda população ainda hoje compartilhe rápido.",

"Governo aprovou benefício secreto e a mídia não quer divulgar compartilhe.",

"Especialistas afirmam que bancos vão bloquear contas amanhã compartilhe urgente."

]

};

let l = ex[tipo];

document.getElementById("entrada").value =
l[Math.floor(Math.random()*l.length)];

}

/* ================= TREINO ================= */

let treino = [

{
t:"URGENTE! Me manda um PIX agora porque perdi meu cartão.",
g:true,
e:"Golpe: pressão + urgência + dinheiro."
},

{
t:"Bom dia, nossa reunião será amanhã às 14h.",
g:false,
e:"Mensagem comum sem sinais fortes."
},

{
t:"Envie o código recebido no SMS imediatamente.",
g:true,
e:"Códigos de verificação nunca devem ser compartilhados."
},

{
t:"Parabéns! Você ganhou um prêmio. Clique no link.",
g:true,
e:"Promessas de prêmio com links são muito usadas em golpes."
},

{
t:"Tudo bem? Depois me chama quando puder.",
g:false,
e:"Mensagem normal e sem sinais suspeitos."
}

];

let atual = 0;

/* ================= MOSTRAR TREINO ================= */

function mostrarTreino(){

document.getElementById("fraseTreino").innerText =
treino[atual].t;

}

/* ================= RESPOSTA ================= */

function responder(resp){

let fb =
document.getElementById("feedback");

if(resp === treino[atual].g){

fb.innerHTML = `
<span class="correct">
✔ Correto
</span>
<br><br>
${treino[atual].e}
`;

}else{

fb.innerHTML = `
<span class="error">
❌ Resposta incorreta
</span>
<br><br>
${treino[atual].e}
`;

}

atual++;

if(atual >= treino.length){
atual = 0;
}

setTimeout(function(){

mostrarTreino();

fb.innerHTML = "";

},6000);

}

/* ================= RESET ================= */

function resetTreino(){

atual = 0;

mostrarTreino();

document.getElementById("feedback").innerHTML = "";

}

/* ================= START ================= */

mostrarTreino();

</script>

</body>
</html>
