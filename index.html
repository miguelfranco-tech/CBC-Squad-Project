<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#e3f2fd,#f5f7fa);
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:120px;
resize:none;
border-radius:10px;
padding:10px;
font-size:16px;
}

button{
margin:5px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#2196f3;
color:#fff;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
animation:fade 0.3s ease;
}

.baixo{background:#c8e6c9;}
.medio{background:#fff9c4;}
.alto{background:#ffcdd2;}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>

<p style="font-size:14px;opacity:0.8;">
Detecta golpes, fake news e mensagens suspeitas de forma simples e clara para sua segurança.
</p>

<textarea id="mensagem" placeholder="Digite ou cole a mensagem..."></textarea>

<br>

<button onclick="analisar()">🔎 Analisar mensagem</button>
<button onclick="simular()">⚡ Simular golpe</button>

<div id="resultado" class="result"></div>

<div style="margin-top:10px;">
<p><b>Isso está correto?</b></p>
<button onclick="feedback(true)">✔ É golpe</button>
<button onclick="feedback(false)">👍 É seguro</button>
</div>

<hr>

<h3>⚠️ Exemplos de golpes</h3>
<button onclick="ex1()">🎁 Prêmio</button>
<button onclick="ex2()">🏦 Banco</button>
<button onclick="ex3()">📢 Fake News</button>

<hr>

<h3>🧠 Treinamento para não cair em golpes</h3>
<p id="treinoTexto">Clique em nova</p>

<button onclick="resposta(true)">✔ Confiar</button>
<button onclick="resposta(false)">❌ Golpe</button>
<br>
<button onclick="novoTreino()">🔄 Nova</button>

<p id="feedbackTreino"></p>
<p id="placar">Pontuação: 0 / 0</p>

</div>

<script>

// =====================
// 🧠 MEMÓRIA IA
// =====================
function carregarMemoria(){
return JSON.parse(localStorage.getItem("memoriaIA")) || [];
}

function salvarMemoria(mem){
localStorage.setItem("memoriaIA", JSON.stringify(mem));
}

// =====================
// 🧠 IA PRINCIPAL
// =====================
function analisar(){

let input = document.getElementById("mensagem").value;

let texto = input.toLowerCase()
.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
.replace(/[@4]/g,"a")
.replace(/[1!]/g,"i")
.replace(/[3]/g,"e")
.replace(/[0]/g,"o")
.replace(/[^a-z0-9\s]/g," ")
.replace(/\s+/g," ")
.trim();

let risco = 0;
let motivos = [];
let intencoes = new Set();
let gatilhos = 0;

// PADRÕES
const padroes = [
{r:/cpf|senha|codigo|cartao/,p:30,m:"Pedindo dados pessoais",i:"Roubo de dados"},
{r:/pix|transferencia|pagamento/,p:30,m:"Pedindo dinheiro",i:"Financeiro"},
{r:/urgente|agora/,p:20,m:"Pressão para agir rápido",i:"Pressão"},
{r:/bloqueado|suspenso/,p:25,m:"Tentando assustar",i:"Medo"},
{r:/clique|link|http/,p:25,m:"Link suspeito",i:"Redirecionamento"},
{r:/ganhou|premio|gratis/,p:25,m:"Promessa falsa",i:"Isca"}
];

padroes.forEach(p=>{
if(p.r.test(texto)){
risco+=p.p;
motivos.push(p.m);
intencoes.add(p.i);
gatilhos++;
}
});

// COMBOS
if(texto.includes("pix") && texto.includes("urgente")){
risco+=40;
motivos.push("PIX + urgência");
}

if(texto.includes("cpf") && texto.includes("bloqueado")){
risco+=40;
motivos.push("Dados + ameaça");
}

// =====================
// 🧠 APRENDIZADO
// =====================
let memoria = carregarMemoria();

memoria.forEach(item=>{
if(texto.includes(item.texto.substring(0,15))){
if(item.golpe){
risco+=25;
motivos.push("Aprendido com uso");
}else{
risco-=15;
}
}
});

// LIMITES
if(risco<0) risco=0;
if(risco>100) risco=100;

// FRASES HUMANAS
let frase;
let classe;

if(risco<30){
frase="Mensagem tranquila.";
classe="baixo";
}
else if(risco<70){
frase="Algo estranho aqui.";
classe="medio";
}
else{
frase="Isso parece golpe!";
classe="alto";
}

// RESULTADO
document.getElementById("resultado").className="result "+classe;

document.getElementById("resultado").innerHTML=`
<h3>${frase}</h3>
<p><b>Risco:</b> ${risco}%</p>
<p><b>Motivos:</b> ${motivos.join(", ") || "Nenhum"}</p>
<p><b>Intenção:</b> ${[...intencoes].join(", ") || "Nenhuma"}</p>
<p style="font-size:12px;">Se tiver dúvida, peça ajuda a alguém de confiança.</p>
`;

}

// =====================
// 🧠 FEEDBACK
// =====================
function feedback(eGolpe){

let texto = document.getElementById("mensagem").value.toLowerCase();

let memoria = carregarMemoria();

memoria.push({texto:texto,golpe:eGolpe});

salvarMemoria(memoria);

document.getElementById("resultado").innerHTML += "<p>✔ IA aprendeu com isso!</p>";
}

// =====================
// ⚡ SIMULAÇÃO
// =====================
function simular(){
let golpes=[
"Envie seu CPF agora",
"PIX urgente necessário",
"Você ganhou prêmio clique aqui",
"Sua conta será bloqueada"
];

document.getElementById("mensagem").value=
golpes[Math.floor(Math.random()*golpes.length)];
}

// =====================
// 🎮 TREINO
// =====================
let pontuacao=0;
let rodada=0;

const treinos=[
{texto:"Reunião às 10h",seguro:true},
{texto:"Envie seu CPF agora",seguro:false},
{texto:"PIX urgente",seguro:false},
{texto:"Documento enviado",seguro:true}
];

let treinoAtual;

function novoTreino(){
treinoAtual = treinos[Math.floor(Math.random()*treinos.length)];
document.getElementById("treinoTexto").innerText = treinoAtual.texto;
}

function resposta(v){

if(!treinoAtual) return;

rodada++;

if(v==treinoAtual.seguro){
pontuacao++;
document.getElementById("feedbackTreino").innerText="✔ Acertou!";
}else{
document.getElementById("feedbackTreino").innerText="❌ Errou!";
}

document.getElementById("placar").innerText=
"Pontuação: "+pontuacao+" / "+rodada;
}

// =====================
// EXEMPLOS
// =====================
function ex1(){document.getElementById("mensagem").value="Você ganhou prêmio clique aqui";}
function ex2(){document.getElementById("mensagem").value="Sua conta será bloqueada envie CPF";}
function ex3(){document.getElementById("mensagem").value="Compartilhe antes que apaguem";}

</script>

</body>
</html>
