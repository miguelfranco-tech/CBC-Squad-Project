<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
font-family:Arial;
background:#eef4ff;
padding:20px;
text-align:center;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* TEXTAREA CENTRAL */
textarea{
display:block;
width:100%;
max-width:600px;
height:120px;
padding:10px;
border-radius:8px;
margin:0 auto 10px auto;
font-size:16px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
opacity:0;
transform:translateY(10px);
transition:0.4s;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.baixo{background:#e8f5e9;}
.medio{background:#fffde7;}
.alto{background:#ffebee;}

.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:10px;
}

#placar{
margin-top:15px;
font-weight:bold;
}

/* LOADING IA */
#loadingIA{
display:none;
margin-top:15px;
}

.barra{
width:100%;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.barra-fill{
height:10px;
width:0%;
background:#1976d2;
transition:width 0.3s;
}
</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital</h2>

<textarea id="mensagem" placeholder="Digite a mensagem"></textarea>

<br>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<!-- 🔥 LOADING IA -->
<div id="loadingIA">
<p id="textoIA">🤖 IA analisando mensagem...</p>
<div class="barra">
<div id="barraIA" class="barra-fill"></div>
</div>
</div>

<div id="resultado" class="result"></div>

<!-- PLACAR -->
<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span>
</div>

<!-- TREINO -->
<div class="treino">

<h3>🎓 Treinamento para não cair em golpes</h3>

<p id="fraseTreino"></p>

<button onclick="responderTreino(true)">❌ É golpe</button>
<button onclick="responderTreino(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetPlacar()">🔄 Resetar treino</button>

</div>

</div>

<script>

// ================= VARIÁVEIS =================
let acertos = 0;
let erros = 0;
let total = 0;

// ================= NORMALIZAR =================
function normalizar(txt){
return txt.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g,"");
}

// ================= CONTAR =================
function contar(lista,texto){
return lista.filter(p=>texto.includes(p)).length;
}

// ================= PESOS =================
const pesos = {
pix:25, dinheiro:20, transferencia:20,
cpf:30, senha:35, codigo:30,
urgente:15, agora:10,
premio:20, ganhou:20,
clique:15, envie:20, confirme:20,
banco:20, conta:20, bloqueado:25
};

// ================= GRUPOS =================
const grupos = {
dinheiro:["pix","dinheiro","transferencia","deposito"],
dados:["cpf","senha","codigo","cartao"],
urgencia:["urgente","agora","imediato","ja"],
acao:["mande","envie","clique","confirme"],
premio:["premio","ganhou","beneficio"],
banco:["banco","conta","bloqueado"]
};

// ================= FRASES =================
const frasesGolpe = [
"me manda pix urgente",
"conta bloqueada confirme cpf",
"ganhe dinheiro facil agora",
"envie codigo sms agora",
"clique para receber premio",
"troquei de numero me manda dinheiro"
];

// ================= ANALISAR =================
function analisar(){

let input = document.getElementById("mensagem").value;
if(!input){
document.getElementById("resultado").innerHTML="Digite uma mensagem.";
return;
}

// 🔥 LOADING IA
let loading = document.getElementById("loadingIA");
let barra = document.getElementById("barraIA");
let textoIA = document.getElementById("textoIA");

loading.style.display="block";
barra.style.width="0%";

let progresso=0;

let intervalo=setInterval(()=>{

progresso+=10;
barra.style.width=progresso+"%";

if(progresso==30) textoIA.innerText="🔍 Analisando padrões...";
if(progresso==60) textoIA.innerText="🧠 Detectando comportamento...";
if(progresso==90) textoIA.innerText="⚠️ Calculando risco...";

if(progresso>=100){
clearInterval(intervalo);
loading.style.display="none";
executarAnaliseReal(input);
}

},120);

}

// ================= ANALISE REAL =================
function executarAnaliseReal(input){

let texto = normalizar(input);
let risco = 0;
let motivos = [];
let tipo = "";

// pesos
Object.keys(pesos).forEach(p=>{
if(texto.includes(p)){
risco += pesos[p];
}
});

// regra forte
if((texto.includes("pix")||texto.includes("cpf")) && texto.includes("urgente")){
risco = 95;
motivos.push("Combinação crítica");
}

if(risco>100) risco=100;
if(risco<5) risco=5;

let nivel =
risco<30?"🟢 Seguro":
risco<70?"🟡 Atenção":"🔴 Golpe";

let r = document.getElementById("resultado");
r.className="result";

// 🔥 DIGITAÇÃO
digitarResultado(r,`
${nivel}

Risco: ${risco}%

Motivos:
${motivos.join(", ") || "Padrões suspeitos detectados"}

Recomendação:
Não envie dinheiro ou dados pessoais.
`,risco);

}

// ================= DIGITAÇÃO =================
function digitarResultado(el,texto,risco){

el.innerHTML="";
let i=0;

let intervalo=setInterval(()=>{

el.innerHTML+=texto[i];
i++;

if(i>=texto.length){
clearInterval(intervalo);

let cor = risco>70?"red":risco>40?"orange":"green";

el.innerHTML+=`
<br><br>
<div class="barra">
<div style="width:${risco}%;height:10px;background:${cor};"></div>
</div>
`;

el.classList.add("show");

}

},15);

}

// ================= TREINO =================
const treino = [
"me manda pix urgente",
"vamos jantar amanhã",
"ganhe dinheiro fácil agora",
"bom dia tudo bem"
];

let atual="";

function novaFrase(){
atual = treino[Math.floor(Math.random()*treino.length)];
document.getElementById("fraseTreino").innerText = atual;
}

function responderTreino(resp){

let suspeita = /(pix|cpf|urgente)/.test(atual);

if(resp===suspeita) acertos++;
else erros++;

total = acertos + erros;
let precisao = Math.round((acertos / total) * 100);

document.getElementById("acertos").innerText = acertos;
document.getElementById("erros").innerText = erros;
document.getElementById("total").innerText = total;
document.getElementById("precisao").innerText = precisao + "%";

document.getElementById("feedback").innerText =
resp===suspeita?"✅ Correto":"❌ Errado";

setTimeout(novaFrase,7000);
}

function resetPlacar(){
acertos=0;erros=0;
document.getElementById("acertos").innerText=0;
document.getElementById("erros").innerText=0;
document.getElementById("total").innerText=0;
document.getElementById("precisao").innerText="0%";
}

// ================= GERAR =================
function gerarMensagem(){
let lista=[
"me manda pix urgente",
"envie cpf agora",
"ganhou premio",
"bom dia"
];
document.getElementById("mensagem").value=
lista[Math.floor(Math.random()*lista.length)];
}

novaFrase();

</script>

</body>
</html>
