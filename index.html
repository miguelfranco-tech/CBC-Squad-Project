<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Detector de Golpes</title>
</head>
<body>

<h2>Detector de Golpes 💻</h2>

<textarea id="mensagem" placeholder="Digite a mensagem aqui..." rows="5" cols="40"></textarea><br><br>

<button onclick="analisar()">Analisar</button>

<p id="resultado"></p>

<script>
function analisar() {

let texto = document.getElementById("mensagem").value.toLowerCase();
texto = texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

let score = 0;
let resultado = "";
 
function detectar(regex, pontos, msg) {
  let match = texto.match(regex);
  if (match) {
    score += pontos * match.length;
    resultado += msg + " (" + match.length + "x)<br>";
  }
}

detectar(/urgente|agora|imediato|rapido/g, 2, "🔴 Urgência");
detectar(/ganhe|lucro|rico|dinheiro/g, 3, "💰 Promessa");
detectar(/premio|oferta|brinde/g, 2, "🎁 Oferta");
detectar(/cpf|senha|codigo|cartao/g, 5, "🔒 Dados sensíveis");
detectar(/segredo|ajuda|desesperado/g, 2, "🧠 Emoção");
detectar(/midia|censurado|escondem/g, 2, "🌐 Fake news");
detectar(/clique|link|acesse/g, 3, "🔗 Link");

function aleatorio(lista) {
  return lista[Math.floor(Math.random() * lista.length)];
}

let baixo = ["🟢 Baixa probabilidade de manipulação"];
let leve = ["🟠 Possíveis indícios leves"];
let medio = ["🟡 Presença moderada"];
let alto = ["🔴 Alta probabilidade de golpe"];

let nivel = "";

if (score >= 10) {
  nivel = aleatorio(alto);
} else if (score >= 5) {
  nivel = aleatorio(medio);
} else if (score > 0) {
  nivel = aleatorio(leve);
} else {
  nivel = aleatorio(baixo);
}

document.getElementById("resultado").innerHTML =
resultado + "<br><b>Pontuação: " + score + "<br>" + nivel + "</b>";

}
</script>

</body>
</html>
