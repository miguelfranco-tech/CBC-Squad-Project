<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#eef4ff,#f9fbff);
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

textarea{
width:100%;
height:120px;
border-radius:10px;
padding:10px;
border:1px solid #ccc;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;color:#1565c0;}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
}

.baixo{background:#e8f5e9;border-left:5px solid green;}
.medio{background:#fffde7;border-left:5px solid orange;}
.alto{background:#ffebee;border-left:5px solid red;}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>

<textarea id="mensagem" placeholder="Digite a mensagem"></textarea>

<br>
<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>
<button class="secondary" onclick="gerarPorNivel('alto')">🔴 Golpe</button>
<button class="secondary" onclick="gerarPorNivel('medio')">🟡 Suspeita</button>
<button class="secondary" onclick="gerarPorNivel('baixo')">🟢 Normal</button>

<h3>⚠️ Exemplos</h3>
<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📢 Fake News</button>

<div id="resultado" class="result"></div>

<h3>🧠 Treinamento para não cair em golpes</h3>
<p id="treinoTexto"></p>

<button onclick="responder(true)">❌ Golpe</button>
<button onclick="responder(false)">✔ Seguro</button>

<p id="feedbackTreino"></p>

<div style="background:#ddd;height:18px;border-radius:10px;">
<div id="barra" style="height:100%;width:0%;background:green;border-radius:10px;"></div>
</div>
<p id="progresso">0 de 0</p>

</div>

<script>

// NORMALIZAR
function normalizar(txt){
return txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// ================= FRASES (35x3) =================
const frases = {
alto: [
"troquei de numero me manda pix urgente","preciso de dinheiro agora urgente",
"seu cartao foi clonado confirme dados","conta bloqueada envie cpf",
"clique para evitar bloqueio","envie sua senha agora","ganhou premio informe dados",
"retire dinheiro agora","transferencia urgente","deposito pendente",
"seguranca comprometida","codigo invalido confirme","envie foto cartao",
"acesso negado envie dados","conta sera bloqueada","confirme cpf agora",
"atualize senha urgente","pix necessario agora","manda dinheiro rapido",
"liberacao valor pendente","envie dados bancarios","clique liberar acesso",
"transferencia falhou confirme","confirme identidade urgente",
"conta em risco","informe senha","codigo invalido",
"pagamento urgente","ganhe dinheiro rapido","saque urgente",
"atualize info","envie comprovante","acao obrigatoria",
"confirme para evitar perda","dinheiro bloqueado"
],

medio: [
"verifique conta","atualize dados","clique detalhes","promocao disponivel",
"beneficio ativo","confirme info","mensagem importante","aviso sistema",
"acao necessaria","cadastro revisao","novo acesso","info pendente",
"atualizacao necessaria","oferta especial","promocao limitada",
"beneficio disponivel","verificacao recomendada","ajuste conta",
"confirme cadastro","revisao seguranca","nova notificacao",
"recebeu oferta","aviso importante","atualize cadastro",
"confirme login","mensagem automatica","sistema detectou",
"novo alerta","cheque conta","atualizacao disponivel",
"verifique agora","nova info","confira detalhes","acesso mudou",
"notificacao sistema"
],

baixo: [
"vamos conversar depois","te ligo mais tarde","reuniao amanha","cheguei casa",
"tudo certo","boa noite","como voce esta","vamos almocar",
"me ajuda depois","ja viu isso","te mando depois",
"estou ocupado","falo depois","obrigado","ate amanha",
"bom dia","boa tarde","chegando ai","me chama depois",
"vamos marcar","tudo bem","terminou","pode esperar",
"me avisa","vou sair","cheguei agora","falamos depois",
"te vejo","vamos estudar","ja fiz","estou aqui",
"tudo tranquilo","sem problema","pode deixar","combinado"
]
};

// ================= PALAVRAS =================
const palavras = {
alto:["urgente","agora","senha","cpf","pix","bloqueado","codigo","confirme","transferencia","imediato"],
medio:["verifique","atualize","aviso","alerta","importante","oferta","promocao","beneficio","notificacao","acesso"]
};

// ================= IA =================
function analisar(){

let texto = normalizar(document.getElementById("mensagem").value);

if(!texto){
document.getElementById("resultado").innerHTML="Digite algo";
return;
}

let risco=0;
let motivos=[];

// FRASES
frases.alto.forEach(f=>{
if(texto.includes(f)){risco+=40;motivos.push("Frase forte");}
});
frases.medio.forEach(f=>{
if(texto.includes(f)){risco+=15;motivos.push("Frase suspeita");}
});

// PALAVRAS
palavras.alto.forEach(p=>{
if(texto.includes(p)){risco+=15;motivos.push("Palavra forte: "+p);}
});
palavras.medio.forEach(p=>{
if(texto.includes(p)){risco+=6;motivos.push("Palavra suspeita: "+p);}
});

if(risco>100) risco=100;
if(risco<10) risco=10;

let nivel = risco<30?"🟢 Seguro":risco<70?"🟡 Atenção":"🔴 Golpe";
let classe = risco<30?"baixo":risco<70?"medio":"alto";

let r = document.getElementById("resultado");
r.className="result "+classe;

r.innerHTML=`
<h3>${nivel}</h3>
<p><b>Risco:</b> ${risco}%</p>
<p>${motivos.join("<br>")}</p>
<p><b>O que fazer:</b><br>
Não clique em links<br>
Não envie dinheiro<br>
Confirme fora da conversa</p>
`;
}

// ================= GERAR =================
function gerarMensagem(){
let todas=[...frases.alto,...frases.medio,...frases.baixo];
document.getElementById("mensagem").value =
todas[Math.floor(Math.random()*todas.length)];
}

function gerarPorNivel(n){
let lista=frases[n];
document.getElementById("mensagem").value =
lista[Math.floor(Math.random()*lista.length)];
}

// ================= EXEMPLOS =================
function exemplo(t){
const e={
banco:[
"Seu banco detectou atividade suspeita, confirme seus dados",
"Conta bloqueada, envie CPF para desbloquear"
],
premio:[
"Você ganhou um prêmio, clique para receber",
"Informe seus dados para retirar o prêmio"
],
fake:[
"URGENTE bancos vão fechar amanhã",
"Nova lei permite ganhar dinheiro fácil"
]
};
let lista=e[t];
document.getElementById("mensagem").value =
lista[Math.floor(Math.random()*lista.length)];
}

// ================= TREINO =================
const treino=[
{t:"pix urgente agora",g:true},
{t:"reuniao amanha",g:false},
{t:"ganhou premio",g:true},
{t:"vamos almocar",g:false}
];

let i=0,a=0,t=0;

function nova(){
i=Math.floor(Math.random()*treino.length);
document.getElementById("treinoTexto").innerText=treino[i].t;
}

function responder(r){
t++;
let f=document.getElementById("feedbackTreino");

if(r===treino[i].g){
a++;f.innerHTML="✅ Acertou";f.style.color="green";
}else{
f.innerHTML="❌ Errou";f.style.color="red";
}

let p=Math.round((a/t)*100);
document.getElementById("barra").style.width=p+"%";
document.getElementById("progresso").innerText=a+" de "+t;

setTimeout(nova,1200);
}

nova();

</script>

</body>
</html>
