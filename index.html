<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>

/* ================= BASE ================= */
body{
font-family:Arial;
background:linear-gradient(135deg,#eef4ff,#dfe9ff);
padding:20px;
text-align:center;
}

/* ================= CONTAINER ================= */
.container{
max-width:950px;
margin:auto;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

/* ================= TITULO ================= */
h2{
margin-bottom:15px;
}

/* ================= TEXTAREA CENTRALIZADO ================= */
textarea{
width:100%;
max-width:700px;
height:140px;
padding:14px;
border-radius:12px;
font-size:16px;
margin:0 auto 15px auto;
display:block;
border:1px solid #ccc;
transition:0.3s;
}

/* efeito foco */
textarea:focus{
outline:none;
border:1px solid #1976d2;
box-shadow:0 0 10px rgba(25,118,210,0.3);
}

/* ================= BOTÕES ================= */
button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.primary{
background:#1976d2;
color:white;
}

.secondary{
background:#e3f2fd;
}

/* ================= RESULT ================= */
.result{
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:left;
animation:fadeIn 0.4s ease;
}

.baixo{background:#e8f5e9;}
.medio{background:#fffde7;}
.alto{background:#ffebee;}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* ================= BARRA ================= */
.barra{
height:10px;
background:#ddd;
border-radius:10px;
margin-top:5px;
overflow:hidden;
}

.barra-fill{
height:100%;
width:0%;
transition:1s;
}

/* ================= TREINO ================= */
.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:12px;
}

/* ================= PLACAR ================= */
#placar{
margin-top:10px;
font-weight:bold;
}

/* ================= BADGES ================= */
.badge{
display:inline-block;
padding:5px 10px;
border-radius:8px;
font-size:12px;
margin:3px;
background:#e3f2fd;
}

/* ================= RESPONSIVO ================= */
@media(max-width:600px){
textarea{
max-width:100%;
}
}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="mensagem" placeholder="Digite uma mensagem suspeita..."></textarea>

<br>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado" class="result"></div>

<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span> |
📈 Nível: <span id="nivelUser">Iniciante</span>
</div>

<div class="treino">

<h3>🎓 Treinamento para não cair em golpes</h3>

<p id="fraseTreino"></p>

<button onclick="responderTreino(true)">❌ É golpe</button>
<button onclick="responderTreino(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetPlacar()">🔄 Resetar treino</button>

</div>

</div>

<script>

// ================= NORMALIZAR =================
function normalizar(txt){
return txt.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g,"");
}

// ================= BANCO =================
const banco = {
dinheiro:["pix","dinheiro","transferencia","deposito","pagamento","valor","taxa","cobranca","manda dinheiro"],
dados:["cpf","senha","codigo","cartao","dados","confirmar dados","validar conta"],
urgencia:["urgente","agora","imediato","ja","rapido","ultimo aviso"],
acao:["mande","envie","clique","confirme","acesse"],
premio:["premio","ganhou","beneficio","bonus"],
emocao:["socorro","me ajuda","por favor","preciso"],
fake:["nova lei","governo liberou","compartilhe","nao aparece na tv"]
};

// ================= CONTAR =================
function contar(lista,texto){
return lista.filter(p=>texto.includes(p)).length;
}

// ================= ANALISAR =================
function analisar(){

let r = document.getElementById("resultado");

r.className="result medio";
r.innerHTML="🧠 IA analisando...";

setTimeout(()=>{

let texto = normalizar(document.getElementById("mensagem").value);

let risco=0;
let motivos=[];

// scores
let s1=contar(banco.dinheiro,texto);
let s2=contar(banco.dados,texto);
let s3=contar(banco.urgencia,texto);
let s4=contar(banco.acao,texto);
let s5=contar(banco.premio,texto);
let s6=contar(banco.emocao,texto);
let s7=contar(banco.fake,texto);

risco += s1*15 + s2*20 + s3*10 + s4*10 + s5*12 + s6*10 + s7*15;

// motivos
if(s1) motivos.push("💰 dinheiro");
if(s2) motivos.push("🔒 dados");
if(s3) motivos.push("⏰ urgência");
if(s4) motivos.push("👉 ação");
if(s5) motivos.push("🎁 prêmio");
if(s6) motivos.push("😢 emoção");
if(s7) motivos.push("📢 fake news");

// regras
if((texto.match(/urgente/g)||[]).length>=2){
risco+=20;
motivos.push("urgência repetida");
}

if(texto.split(" ").length<=5 && risco>20){
risco+=15;
motivos.push("mensagem curta");
}

if((s1||s2)&&s3){
risco=90;
motivos.push("combinação crítica");
}

if(/me manda pix/.test(texto)){
risco=95;
motivos.push("frase clássica");
}

if(risco>100) risco=100;
if(risco<5) risco=5;

let classe = risco<30?"baixo":risco<70?"medio":"alto";
let nivel = risco>70?"🔴 Alto risco":risco>40?"🟡 Atenção":"🟢 Seguro";

let barraCor = risco>70?"red":risco>40?"orange":"green";

r.className="result "+classe;

r.innerHTML=`
<h3>${nivel}</h3>
<p><b>Risco:</b> ${risco}%</p>

<p><b>Sinais:</b><br>
${motivos.join("<br>") || "Nenhum"}
</p>

<p><b>Explicação:</b><br>
A mensagem contém padrões usados em golpes digitais.
</p>

<p><b>O que fazer:</b><br>
• Não enviar dinheiro<br>
• Não informar dados<br>
• Confirmar com alguém
</p>

<div class="barra">
<div class="barra-fill" id="barraFill" style="background:${barraCor};"></div>
</div>
`;

setTimeout(()=>{
document.getElementById("barraFill").style.width=risco+"%";
},100);

},1000);
}

// ================= TREINO =================
let acertos=0, erros=0;

const treino=[
{frase:"me manda pix urgente",golpe:true},
{frase:"envie cpf agora",golpe:true},
{frase:"ganhou premio",golpe:true},
{frase:"bom dia",golpe:false},
{frase:"vamos sair",golpe:false},
{frase:"reunião às 14h",golpe:false}
];

let atual="";

function novaFrase(){
let obj=treino[Math.floor(Math.random()*treino.length)];
atual=obj.frase;
document.getElementById("fraseTreino").innerText=atual;
document.getElementById("feedback").innerText="";
}

function responderTreino(resp){

let suspeita=/(pix|cpf|urgente|premio)/.test(atual);

if(resp===suspeita) acertos++;
else erros++;

let total=acertos+erros;
let precisao=Math.round((acertos/total)*100);

document.getElementById("acertos").innerText=acertos;
document.getElementById("erros").innerText=erros;
document.getElementById("total").innerText=total;
document.getElementById("precisao").innerText=precisao+"%";

document.getElementById("feedback").innerHTML=`
${resp===suspeita?"✅ Correto":"❌ Errado"}<br>
Evite clicar, enviar dados ou dinheiro.
`;

setTimeout(novaFrase,7000);
}

function resetPlacar(){
acertos=0;erros=0;
document.getElementById("acertos").innerText=0;
document.getElementById("erros").innerText=0;
document.getElementById("total").innerText=0;
document.getElementById("precisao").innerText="0%";
}

// ================= GERAR =================
function gerarMensagem(){
let lista=[
"me manda pix urgente",
"envie cpf agora",
"ganhou premio",
"nova lei libera dinheiro",
"bom dia tudo bem"
];
document.getElementById("mensagem").value=
lista[Math.floor(Math.random()*lista.length)];
}

// ================= EXEMPLOS =================
function exemplo(tipo){

const dados={
banco:["Conta bloqueada confirme CPF","Acesso suspeito detectado"],
premio:["Você ganhou prêmio clique","Retire prêmio agora"],
fake:["Nova lei libera dinheiro","Governo liberou benefício"]
};

let lista=dados[tipo];
document.getElementById("mensagem").value=
lista[Math.floor(Math.random()*lista.length)];
}

novaFrase();

</script>

</body>
</html>
