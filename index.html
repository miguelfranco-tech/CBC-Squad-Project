<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ================= BODY ================= */
body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#e3f2fd,#ffffff);
display:flex;
justify-content:center;
min-height:100vh;
}

/* ================= CONTAINER ================= */
.container{
width:90%;
max-width:900px;
margin-top:40px;
text-align:center;
}

/* ================= INPUT ================= */
textarea{
width:100%;
height:120px;
border-radius:10px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
resize:none;
}

/* ================= BOTÕES ================= */
button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.primary{
background:#2196f3;
color:white;
}

.secondary{
background:#e3f2fd;
color:#0d47a1;
}

/* ================= RESULTADO ================= */
.resultado-box{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:left;
animation:fade .4s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* ================= BARRA ================= */
.risk-bar{
width:100%;
height:12px;
background:#eee;
border-radius:10px;
margin:10px 0;
overflow:hidden;
}

.risk-fill{
height:100%;
border-radius:10px;
transition:.6s;
}

/* ================= LOADING ================= */
.loading{
margin-top:15px;
font-style:italic;
color:#555;
}

/* ================= TREINO ================= */
.treino{
margin-top:30px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.correct{color:green;font-weight:bold;}
.error{color:red;font-weight:bold;}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="entrada" placeholder="Digite uma mensagem suspeita..."></textarea>

<br>

<button class="primary" onclick="analisar()">🔍 Analisar</button>
<button class="secondary" onclick="gerar()">✨ Gerar</button>

<br>

<button class="secondary" onclick="exemplo('banco')">🏦 Golpe Bancário</button>
<button class="secondary" onclick="exemplo('premio')">🎁 Golpe de Prêmio</button>
<button class="secondary" onclick="exemplo('fake')">📰 Fake News</button>

<div id="loading" class="loading"></div>
<div id="resultado"></div>

<div class="treino">

<h3>🎓 Treinamento Inteligente</h3>

<p id="fraseTreino"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetTreino()">🔄 Resetar</button>

</div>

</div>

<script>

/* ================= UTIL ================= */
function esc(str){
return str.replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));
}

/* ================= NORMALIZAÇÃO ================= */
function normalizar(txt){
return txt.toLowerCase()
.replace(/[0]/g,"o")
.replace(/[1]/g,"i")
.replace(/[3]/g,"e")
.replace(/[4]/g,"a")
.replace(/[5]/g,"s")
.replace(/[7]/g,"t")
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g," ")
.replace(/\s+/g," ")
.replace(/(.)\1{2,}/g,"$1")
.replace(/\bp[\W_]*[i1l][\W_]*x\b/g,"pix")
.replace(/\bc[\W_]*0[\W_]*d[\W_]*i[\W_]*g[\W_]*o\b/g,"codigo");
}

/* ================= IA PRINCIPAL ================= */
function analisarMensagem(texto){

texto = normalizar(texto);

let risco = 0;
let sinais = new Set();
let explicacao = new Set();

/* ===== FLAGS ===== */
let acao = /\b(envie|mande|clique|acesse|confirme|resgate|transfira|faça)\b/.test(texto);
let urgencia = /\b(urgente|agora|ja|imediato|rapido)\b/.test(texto);
let dinheiro = /\b(pix|dinheiro|transferencia|deposito|valor)\b/.test(texto);
let dados = /\b(cpf|senha|codigo|verificacao|cartao)\b/.test(texto);
let autoridade = /\b(banco|suporte|central|governo|atendente)\b/.test(texto);
let premio = /\b(premio|ganhou|beneficio|resgate)\b/.test(texto);
let link = /\b(http|link|acesse)\b/.test(texto);
let emocional = /\b(me ajuda|por favor|socorro|preciso muito)\b/.test(texto);

/* ===== SCORE ===== */
if(acao){risco+=15; sinais.add("Ação"); explicacao.add("Solicita ação direta.");}
if(urgencia){risco+=20; sinais.add("Urgência"); explicacao.add("Pressiona decisão rápida.");}
if(dinheiro){risco+=30; sinais.add("Dinheiro"); explicacao.add("Pedido financeiro.");}
if(dados){risco+=40; sinais.add("Dados"); explicacao.add("Solicitação de dados sensíveis.");}
if(autoridade){risco+=15; sinais.add("Autoridade"); explicacao.add("Finge instituição.");}
if(premio){risco+=25; sinais.add("Prêmio"); explicacao.add("Promessa suspeita.");}
if(link){risco+=25; sinais.add("Link"); explicacao.add("Possível redirecionamento falso.");}
if(emocional){risco+=20; sinais.add("Emocional"); explicacao.add("Pressão emocional.");}

/* ===== COMBINAÇÕES ===== */
if(dinheiro && urgencia && acao){
risco = Math.max(risco,97);
explicacao.add("Golpe clássico (dinheiro + urgência).");
}

if(dados && acao){
risco = Math.max(risco,97);
explicacao.add("Pedido crítico de dados.");
}

if(autoridade && link){
risco = Math.max(risco,92);
explicacao.add("Possível phishing.");
}

/* ===== IMPLÍCITO ===== */
if(/troquei.*numero/.test(texto)){
risco = Math.max(risco,95);
explicacao.add("Golpe número trocado.");
}

/* ===== AJUSTES ===== */
if(texto.split(" ").length <= 6 && (dinheiro || dados)){
risco += 15;
}

if(/bom dia|boa tarde|reuniao/.test(texto)){
risco -= 20;
}

/* ===== LIMITES ===== */
risco = Math.max(0,Math.min(100,risco));

let nivel =
risco>=90?"🔴 Golpe quase certo":
risco>=70?"🔴 Alto risco":
risco>=45?"🟡 Muito suspeito":
risco>=25?"🟠 Atenção":
"🟢 Seguro";

let resumo =
risco>=90?"Alta probabilidade de golpe.":
risco>=60?"Forte suspeita.":
risco>=30?"Atenção necessária.":
"Sem risco relevante.";

return {risco,nivel,sinais:[...sinais],explicacao:[...explicacao],resumo};

}

/* ================= ANALISAR ================= */
function analisar(){

let entrada = document.getElementById("entrada").value;

if(!entrada){
alert("Digite uma mensagem!");
return;
}

document.getElementById("loading").innerText = "Analisando...";

setTimeout(()=>{

let r = analisarMensagem(entrada);

let cor =
r.risco>=70?"#f44336":
r.risco>=40?"#ff9800":"#4caf50";

document.getElementById("loading").innerText = "";

document.getElementById("resultado").innerHTML = `
<div class="resultado-box">

<h3>${r.nivel}</h3>

<div class="risk-bar">
<div class="risk-fill" style="width:${r.risco}%;background:${cor}"></div>
</div>

<p><b>Risco:</b> ${r.risco}%</p>

<p><b>Resumo:</b> ${r.resumo}</p>

<p><b>Sinais:</b><br>${r.sinais.join("<br>")}</p>

<p><b>Explicação:</b><br>${r.explicacao.join("<br>")}</p>

<p><b>Como evitar:</b><br>
• Não envie dinheiro<br>
• Não compartilhe dados<br>
• Confirme com a pessoa<br>
• Desconfie de urgência
</p>

</div>
`;

},800);

}

/* ================= RESTANTE ================= */
function gerar(){
document.getElementById("entrada").value = "me manda pix urgente";
}

function exemplo(tipo){
const ex={
banco:["confirme cpf agora","acesso suspeito envie codigo"],
premio:["ganhou premio clique link","resgate beneficio agora"],
fake:["governo liberou dinheiro","segredo compartilhe"]
};
let l=ex[tipo];
document.getElementById("entrada").value = l[Math.floor(Math.random()*l.length)];
}

/* ================= TREINO ================= */
let treino=[
{t:"URGENTE me manda um PIX agora",g:true,e:"Golpe financeiro com urgência"},
{t:"Bom dia tudo bem?",g:false,e:"Mensagem normal"},
{t:"Envie seu código agora",g:true,e:"Código é dado sensível"},
{t:"Reunião amanhã às 14h",g:false,e:"Sem risco"}
];

let atual=0;

function mostrarTreino(){
document.getElementById("fraseTreino").innerText=treino[atual].t;
}

mostrarTreino();

function responder(resp){
let fb=document.getElementById("feedback");

if(resp===treino[atual].g){
fb.innerHTML="<span class='correct'>✔ Correto</span><br>"+treino[atual].e;
}else{
fb.innerHTML="<span class='error'>❌ Errado</span><br>"+treino[atual].e;
}

atual=(atual+1)%treino.length;

setTimeout(()=>{
fb.innerHTML="";
mostrarTreino();
},7000);
}

function resetTreino(){
atual=0;
mostrarTreino();
document.getElementById("feedback").innerHTML="";
}

</script>

</body>
</html>
