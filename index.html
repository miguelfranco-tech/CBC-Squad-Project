<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
font-family:Arial;
background:#eef4ff;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
margin-bottom:10px;
font-size:16px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
}

.baixo{background:#e8f5e9;}
.medio{background:#fffde7;}
.alto{background:#ffebee;}

.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:10px;
}

#placar{
margin-top:15px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital</h2>

<textarea id="mensagem" placeholder="Digite a mensagem"></textarea>

<br>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado" class="result"></div>

<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span>
</div>

<div class="treino">

<h3>🎓 Treinamento para não cair em golpes</h3>

<p id="fraseTreino"></p>

<button onclick="responderTreino(true)">❌ É golpe</button>
<button onclick="responderTreino(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetPlacar()">🔄 Resetar treino</button>

</div>

</div>

<script>

// ================= BASE =================

function normalizar(txt){
return txt.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g,"");
}

// ================= PADRÕES AVANÇADOS =================

const padroesGolpe = [
{nome:"Falso parente", regex:/(mae|pai).*(troquei|novo).*(numero).*(pix|dinheiro)/, risco:95},
{nome:"Golpe bancário", regex:/(conta|banco).*(bloquead|acesso).*(envie|confirme)/, risco:90},
{nome:"Golpe de prêmio", regex:/(ganhou|premio).*(clique|retire)/, risco:85},
{nome:"Dinheiro fácil", regex:/(dinheiro).*(facil|rapido)/, risco:85}
];

const padroesFake = [
{regex:/(nova lei).*(dinheiro|beneficio)/, risco:40, motivo:"Notícia falsa de lei"},
{regex:/(governo).*(liberou|pagando)/, risco:40, motivo:"Afirmação sem fonte"},
{regex:/(nao aparece na tv)/, risco:35, motivo:"Descredibilização da mídia"}
];

// ================= FRASES =================

const frasesGolpe = [
"me manda pix urgente",
"envie seu cpf agora",
"ganhou premio clique aqui"
];

// ================= ANALISAR =================

function analisar(){

let input = document.getElementById("mensagem").value;
if(!input){
document.getElementById("resultado").innerHTML="Digite algo.";
return;
}

let texto = normalizar(input);
let risco = 0;
let motivos = [];
let tipo = "Não identificado";

// ===== DETECÇÃO BASE =====

let temDinheiro = /(pix|dinheiro)/.test(texto);
let temDados = /(cpf|senha|codigo)/.test(texto);
let temUrgencia = /(urgente|agora)/.test(texto);
let temAcao = /(mande|envie|clique|confirme)/.test(texto);

// ===== HARD RULES =====

if(temDinheiro && temUrgencia){
risco = 90;
motivos.push("Dinheiro + urgência");
tipo="Golpe financeiro";
}

if(temDados && temAcao){
risco = 95;
motivos.push("Pedido de dados");
tipo="Roubo de dados";
}

// ===== PADRÕES =====

padroesGolpe.forEach(p=>{
if(p.regex.test(texto)){
risco = Math.max(risco,p.risco);
tipo = p.nome;
motivos.push("Padrão detectado: "+p.nome);
}
});

// ===== FAKE NEWS =====

padroesFake.forEach(p=>{
if(p.regex.test(texto)){
risco += p.risco;
tipo="Fake News";
motivos.push(p.motivo);
}
});

// ===== SINAIS =====

if(temDinheiro){risco+=30;motivos.push("Pedido de dinheiro");}
if(temDados){risco+=40;motivos.push("Dados pessoais");}
if(temUrgencia){risco+=20;motivos.push("Urgência");}
if(temAcao){risco+=20;motivos.push("Ação obrigatória");}

// ===== EMOÇÃO =====

if(/me ajuda|socorro/.test(texto)){
risco+=20;
motivos.push("Pressão emocional");
}

// ===== CURTA =====

if(texto.split(" ").length <=5 && temAcao){
risco+=20;
motivos.push("Mensagem curta suspeita");
}

// ===== FRASES PRONTAS =====

frasesGolpe.forEach(f=>{
if(texto.includes(f)){
risco = Math.max(risco,90);
motivos.push("Frase clássica de golpe");
}
});

// ===== LIMITES =====

if(risco>100) risco=100;
if(risco<5) risco=5;

// ===== CLASSIFICAÇÃO =====

let nivel =
risco<30?"🟢 Seguro":
risco<70?"🟡 Atenção":"🔴 Golpe";

let classe =
risco<30?"baixo":
risco<70?"medio":"alto";

// ===== EXPLICAÇÃO =====

let explicacao="";

if(tipo==="Fake News"){
explicacao="Mensagem com características de desinformação.";
}
else if(risco>70){
explicacao="Alta probabilidade de golpe.";
}
else if(risco>30){
explicacao="Mensagem suspeita.";
}
else{
explicacao="Mensagem aparentemente segura.";
}

// ===== OUTPUT =====

let r = document.getElementById("resultado");
r.className="result "+classe;

r.innerHTML=`
<h3>${nivel}</h3>
<p><b>Risco:</b> ${risco}%</p>
<p><b>Tipo:</b> ${tipo}</p>
<p><b>Explicação:</b> ${explicacao}</p>
<p><b>Sinais:</b><br>${motivos.join("<br>")}</p>
`;

}

// ================= GERAR =================

function gerarMensagem(){
let lista=[
"me manda pix urgente",
"bom dia",
"nova lei libera dinheiro",
"envie cpf agora",
"vamos sair"
];
document.getElementById("mensagem").value =
lista[Math.floor(Math.random()*lista.length)];
}

// ================= EXEMPLOS =================

function exemplo(tipo){

let banco=[
"Conta bloqueada confirme CPF",
"Acesso suspeito detectado"
];

let premio=[
"Você ganhou prêmio clique",
"Retire prêmio agora"
];

let fake=[
"Nova lei libera dinheiro",
"Governo liberou benefício"
];

let lista = tipo==="banco"?banco:tipo==="premio"?premio:fake;

document.getElementById("mensagem").value =
lista[Math.floor(Math.random()*lista.length)];
}

// ================= TREINAMENTO =================

let acertos=0, erros=0;

const treino=[
{frase:"me manda pix urgente", golpe:true},
{frase:"bom dia", golpe:false},
{frase:"ganhou premio clique", golpe:true},
{frase:"reunião às 14h", golpe:false}
];

let atual="";

function novaFrase(){
let obj = treino[Math.floor(Math.random()*treino.length)];
atual=obj.frase;
document.getElementById("fraseTreino").innerText=atual;
document.getElementById("feedback").innerText="";
}

function responderTreino(resp){

let correta = treino.find(f=>f.frase===atual).golpe;

if(resp===correta) acertos++;
else erros++;

let total = acertos+erros;
let precisao = total>0?Math.round((acertos/total)*100):0;

document.getElementById("acertos").innerText=acertos;
document.getElementById("erros").innerText=erros;
document.getElementById("total").innerText=total;
document.getElementById("precisao").innerText=precisao+"%";

document.getElementById("feedback").innerText =
resp===correta?"✅ Correto":"❌ Errado";

setTimeout(novaFrase,2000);
}

function resetPlacar(){
acertos=0;erros=0;
document.getElementById("acertos").innerText=0;
document.getElementById("erros").innerText=0;
document.getElementById("total").innerText=0;
document.getElementById("precisao").innerText="0%";
}

novaFrase();

</script>

</body>
</html>
