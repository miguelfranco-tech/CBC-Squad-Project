<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>

/* ================= BASE ================= */
body{
font-family:Arial;
background:#eef4ff;
padding:20px;
text-align:center;
}

/* ================= CONTAINER ================= */
.container{
max-width:780px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.12);
}

/* ================= TEXTAREA ================= */
textarea{
display:block;
width:90%;
max-width:600px;
height:120px;
padding:12px;
border-radius:10px;
margin:0 auto 15px auto;
font-size:16px;
border:1px solid #ccc;
}

/* ================= BOTÕES ================= */
button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;}

/* ================= RESULT ================= */
.result{
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:left;
opacity:0;
transform:translateY(15px);
transition:0.4s;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.baixo{background:#e8f5e9;}
.medio{background:#fffde7;}
.alto{background:#ffebee;}

/* ================= LOADING ================= */
#loadingIA{
display:none;
margin-top:15px;
}

.barra{
width:100%;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.barra-fill{
height:10px;
width:0%;
background:#1976d2;
transition:width 0.2s;
}

/* ================= TREINO ================= */
.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:10px;
}

#placar{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="mensagem" placeholder="Digite uma mensagem suspeita"></textarea>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<!-- LOADING IA -->
<div id="loadingIA">
<p id="textoIA">🤖 IA iniciando análise...</p>
<div class="barra">
<div id="barraIA" class="barra-fill"></div>
</div>
</div>

<div id="resultado" class="result"></div>

<!-- PLACAR -->
<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span>
</div>

<!-- TREINAMENTO -->
<div class="treino">

<h3>🎓 Treinamento</h3>

<p id="fraseTreino"></p>

<button onclick="responderTreino(true)">❌ É golpe</button>
<button onclick="responderTreino(false)">✅ É seguro</button>

<p id="feedback"></p>

</div>

</div>

<script>

// ================= VARIÁVEIS =================
let acertos=0, erros=0;

// ================= NORMALIZAR =================
function normalizar(txt){
return txt.toLowerCase();
}

// ================= ANALISAR =================
function analisar(){

let input=document.getElementById("mensagem").value;
if(!input) return;

// reset UI
let barra=document.getElementById("barraIA");
let textoIA=document.getElementById("textoIA");
let loading=document.getElementById("loadingIA");
let resultado=document.getElementById("resultado");

barra.style.width="0%";
resultado.classList.remove("show");
resultado.innerHTML="";

loading.style.display="block";

let progresso=0;

let intervalo=setInterval(()=>{

progresso+=5;
barra.style.width=progresso+"%";

if(progresso==25) textoIA.innerText="🔍 Analisando palavras...";
if(progresso==60) textoIA.innerText="🧠 Detectando padrões...";
if(progresso==85) textoIA.innerText="⚠️ Calculando risco...";

if(progresso>=100){
clearInterval(intervalo);
loading.style.display="none";
gerarResultado(input);
}

},70);

}

// ================= RESULTADO =================
function gerarResultado(input){

let texto=normalizar(input);
let risco=0;

if(texto.includes("pix")) risco+=40;
if(texto.includes("cpf")) risco+=40;
if(texto.includes("urgente")) risco+=20;
if(texto.includes("ganhou")) risco+=25;

if(risco>100) risco=100;
if(risco<5) risco=5;

let nivel=risco>70?"🔴 Golpe":risco>40?"🟡 Atenção":"🟢 Seguro";
let cor=risco>70?"red":risco>40?"orange":"green";

let resposta=`
${nivel}

Risco: ${risco}%

Sinais detectados:
- presença de palavras suspeitas

Recomendação:
Nunca envie dinheiro ou dados pessoais.
`;

digitar(resposta,cor,risco);

}

// ================= DIGITAÇÃO =================
function digitar(texto,cor,risco){

let el=document.getElementById("resultado");
let i=0;
el.innerHTML="";

let intervalo=setInterval(()=>{

el.innerHTML+=texto[i];
i++;

if(i>=texto.length){
clearInterval(intervalo);

el.innerHTML+=`
<br><br>
<div class="barra">
<div style="width:${risco}%;height:10px;background:${cor};"></div>
</div>
`;

el.classList.add("show");

}

},15);

}

// ================= TREINO =================
const treino=[
"me manda pix urgente",
"bom dia tudo bem",
"envie cpf agora",
"vamos sair amanhã"
];

let atual="";

function novaFrase(){
atual=treino[Math.floor(Math.random()*treino.length)];
document.getElementById("fraseTreino").innerText=atual;
document.getElementById("feedback").innerText="";
}

function responderTreino(resp){

let suspeita=/(pix|cpf|urgente)/.test(atual);

if(resp===suspeita) acertos++;
else erros++;

let total=acertos+erros;
let precisao=Math.round((acertos/total)*100);

document.getElementById("acertos").innerText=acertos;
document.getElementById("erros").innerText=erros;
document.getElementById("total").innerText=total;
document.getElementById("precisao").innerText=precisao+"%";

document.getElementById("feedback").innerText=
resp===suspeita?"✅ Correto":"❌ Errado";

setTimeout(novaFrase,7000);

}

// ================= GERAR =================
function gerarMensagem(){
let lista=[
"me manda pix urgente",
"envie cpf agora",
"ganhou premio",
"bom dia"
];
document.getElementById("mensagem").value=
lista[Math.floor(Math.random()*lista.length)];
}

// ================= EXEMPLOS =================
function exemplo(tipo){
const dados={
banco:["Conta bloqueada confirme CPF"],
premio:["Você ganhou prêmio"],
fake:["Nova lei libera dinheiro"]
};
let lista=dados[tipo];
document.getElementById("mensagem").value=
lista[Math.floor(Math.random()*lista.length)];
}

novaFrase();

</script>

</body>
</html>
