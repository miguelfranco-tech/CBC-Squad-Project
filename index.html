<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ================= BODY ================= */
body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#e3f2fd,#ffffff);
display:flex;
justify-content:center;
min-height:100vh;
}

/* ================= CONTAINER ================= */
.container{
width:90%;
max-width:900px;
margin-top:40px;
text-align:center;
}

/* ================= TITULO ================= */
h2{
margin-bottom:15px;
}

/* ================= TEXTAREA ================= */
textarea{
width:100%;
height:120px;
border-radius:10px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
resize:none;
}

/* ================= BOTÕES ================= */
button{
padding:12px 22px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.primary{
background:#2196f3;
color:white;
}

.secondary{
background:#e3f2fd;
color:#0d47a1;
}

/* ================= RESULTADO ================= */
.resultado-box{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:left;
animation:fade .4s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* ================= BARRA ================= */
.risk-bar{
width:100%;
height:12px;
background:#eee;
border-radius:10px;
margin:10px 0;
overflow:hidden;
}

.risk-fill{
height:100%;
border-radius:10px;
transition:.6s;
}

/* ================= TREINO ================= */
.treino{
margin-top:40px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.correct{color:green;font-weight:bold;}
.error{color:red;font-weight:bold;}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="entrada" placeholder="Digite uma mensagem suspeita..."></textarea>

<br>

<button class="primary" onclick="analisar()">🔍 Analisar</button>
<button class="secondary" onclick="gerar()">✨ Gerar exemplo</button>

<br>

<!-- BOTÕES DE EXEMPLOS -->
<button class="secondary" onclick="exemplo('banco')">🏦 Golpe Bancário</button>
<button class="secondary" onclick="exemplo('premio')">🎁 Golpe de Prêmio</button>
<button class="secondary" onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado"></div>

<div class="treino">

<h3>🎓 Treinamento Inteligente</h3>

<p id="fraseTreino"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetTreino()">🔄 Resetar treino</button>

</div>

</div>

<script>

/* ================= NORMALIZAÇÃO ================= */
function normalizar(txt){
return txt.toLowerCase()
.replace(/0/g,"o")
.replace(/1/g,"i")
.replace(/3/g,"e")
.replace(/4/g,"a")
.replace(/5/g,"s")
.replace(/7/g,"t")
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g," ");
}

/* ================= IA ================= */
function analisarMensagem(texto){

texto = normalizar(texto);

let risco = 0;
let sinais = [];
let explicacao = [];

const padroes = [

{r:/\burgente\b|\bagora\b/,p:25,n:"Urgência",e:"Pressão para agir rápido"},
{r:/\bcpf\b|\bsenha\b|\bcodigo\b/,p:40,n:"Dados sensíveis",e:"Pedido de informação pessoal"},
{r:/\blink\b|http/,p:25,n:"Link suspeito",e:"Pode levar a site falso"},
{r:/\bnova lei\b|\bgoverno liberou\b/,p:30,n:"Fake News",e:"Desinformação comum"},
{r:/\bganhe dinheiro\b|\blucro facil\b/,p:30,n:"Dinheiro fácil",e:"Promessa irreal"}

];

padroes.forEach(p=>{
if(p.r.test(texto)){
risco+=p.p;
sinais.push(p.n);
explicacao.push("• "+p.e);
}
});

if(/\bpix\b/.test(texto) && /\burgente\b/.test(texto)){
risco+=30;
explicacao.push("• Dinheiro + urgência = golpe clássico");
}

if(/\bcodigo\b/.test(texto) && /\benvie\b|\bmande\b/.test(texto)){
risco+=30;
explicacao.push("• Pedido direto de código");
}

risco=Math.min(risco,100);

let nivel=
risco>=70?"🔴 Alto risco":
risco>=40?"🟡 Atenção":"🟢 Seguro";

return {risco,nivel,sinais,explicacao};
}

/* ================= ANALISAR ================= */
function analisar(){

let entrada=document.getElementById("entrada").value;

if(!entrada){
alert("Digite uma mensagem!");
return;
}

let res=analisarMensagem(entrada);

let cor=
res.risco>=70?"#f44336":
res.risco>=40?"#ff9800":"#4caf50";

document.getElementById("resultado").innerHTML=`
<div class="resultado-box">
<h3>${res.nivel}</h3>

<div class="risk-bar">
<div class="risk-fill" style="width:${res.risco}%;background:${cor}"></div>
</div>

<p><b>Risco:</b> ${res.risco}%</p>

<p><b>Sinais:</b><br>
${res.sinais.map(s=>"• "+s).join("<br>") || "Nenhum"}
</p>

<p><b>Explicação:</b><br>
${res.explicacao.join("<br>") || "Nenhum sinal forte"}
</p>

<p><b>Como evitar:</b><br>
• Não envie dinheiro<br>
• Não compartilhe dados<br>
• Não clique em links desconhecidos<br>
• Confirme a informação
</p>

</div>`;
}

/* ================= GERAR ================= */
function gerar(){
document.getElementById("entrada").value=
"URGENTE: me manda um pix agora preciso muito";
}

/* ================= EXEMPLOS ================= */
function exemplo(tipo){

const exemplos={

banco:[
"URGENTE: sua conta foi bloqueada, confirme seu CPF agora",
"Acesso suspeito detectado, envie seu código de verificação imediatamente"
],

premio:[
"Parabéns! Você ganhou um prêmio exclusivo, clique no link para resgatar agora",
"Você foi selecionado para um benefício, informe seus dados"
],

fake:[
"Nova lei do governo libera dinheiro para toda população",
"Informação vazada: ninguém está falando disso"
]

};

let lista=exemplos[tipo];

document.getElementById("entrada").value=
lista[Math.floor(Math.random()*lista.length)];

}

/* ================= TREINO ================= */
let treino=[

{t:"URGENTE! Troquei de número, pode me mandar um PIX agora?",g:true,e:"Urgência + dinheiro = golpe"},
{t:"Reunião amanhã às 14h",g:false,e:"Mensagem normal"},
{t:"Envie seu código agora",g:true,e:"Código não deve ser enviado"},
{t:"Bom dia tudo bem?",g:false,e:"Mensagem comum"},
{t:"Você ganhou um prêmio, clique no link",g:true,e:"Prêmio + link = golpe"}

];

let atual=0;

function mostrarTreino(){
document.getElementById("fraseTreino").innerText=treino[atual].t;
}

mostrarTreino();

function responder(resp){

let fb=document.getElementById("feedback");

if(resp===treino[atual].g){
fb.innerHTML="<span class='correct'>✔ Correto!</span><br>"+treino[atual].e;
}else{
fb.innerHTML="<span class='error'>❌ Errado!</span><br>"+treino[atual].e;
}

atual=(atual+1)%treino.length;

setTimeout(()=>{
fb.innerHTML="";
mostrarTreino();
},7000);

}

function resetTreino(){
atual=0;
mostrarTreino();
document.getElementById("feedback").innerHTML="";
}

</script>

</body>
</html>
