<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#e3f2fd,#f5f7fa);
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
padding:10px;
font-size:16px;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:10px;
background:#2196f3;
color:white;
font-weight:bold;
cursor:pointer;
}

.result{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>
<p>Detecta golpes e ajuda você a não cair neles.</p>

<textarea id="mensagem" placeholder="Digite ou cole a mensagem aqui"></textarea>

<br>
<button onclick="analisar()">🔎 Analisar mensagem</button>

<div id="resultado" class="result"></div>

<h3>⚠️ Testar exemplos</h3>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📢 Fake News</button>
<button onclick="exemplo('pix')">💸 PIX</button>

<h3>🧠 Treinamento</h3>

<p id="treinoTexto" style="font-weight:bold;font-size:18px;"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✔ É seguro</button>

<br><br>
<button onclick="novaPergunta()">🔄 Nova</button>

<p id="feedbackTreino"></p>

<div style="margin-top:15px;">
<div style="background:#ddd;height:20px;border-radius:10px;">
<div id="barraProgresso" style="height:100%;width:0%;background:#4caf50;border-radius:10px;"></div>
</div>
<p id="textoProgresso">0 de 0</p>
</div>

</div>

<script>

// ================= ANALISAR =================
function analisar(){

let texto = document.getElementById("mensagem").value.toLowerCase();

if(!texto){
document.getElementById("resultado").innerHTML = "Digite uma mensagem.";
return;
}

let risco = 0;
let motivos = [];

const regras = [
{p:["cpf","senha","dados"],peso:30,m:"Pedido de dados pessoais"},
{p:["urgente","agora"],peso:25,m:"Pressão"},
{p:["clique","link"],peso:20,m:"Link suspeito"},
{p:["ganhou","prêmio"],peso:25,m:"Promessa de ganho"},
{p:["pix","transferência"],peso:30,m:"Pedido de dinheiro"},
{p:["bloqueado"],peso:20,m:"Ameaça"}
];

regras.forEach(r=>{
r.p.forEach(p=>{
if(texto.includes(p)){
risco+=r.peso;
motivos.push(r.m);
}
});
});

if(risco>100) risco=100;

let nivel = risco<30 ? "🟢 Seguro" : risco<70 ? "🟡 Atenção" : "🔴 Golpe";

document.getElementById("resultado").innerHTML = `
<h3>${nivel}</h3>
<p><b>Risco:</b> ${risco}%</p>

<p><b>Motivos:</b><br>${motivos.join("<br>") || "Nenhum"}</p>

<p><b>👉 O que fazer:</b><br>
• Não clique em links<br>
• Não envie dinheiro<br>
• Confirme com alguém de confiança
</p>
`;

}

// ================= EXEMPLOS =================
function exemplo(tipo){

const exemplos = {
banco:[
"Conta bloqueada. Envie seus dados.",
"Confirme seu CPF imediatamente.",
"Acesso suspenso, atualize dados."
],
premio:[
"Você ganhou prêmio!",
"Retire seu dinheiro agora!",
"Última chance de ganhar!"
],
fake:[
"URGENTE bancos vão fechar!",
"Nova lei vai tirar dinheiro.",
"Alerta geral!"
],
pix:[
"PIX urgente agora!",
"Me manda dinheiro rápido!",
"Transferência necessária!"
]
};

let lista = exemplos[tipo];
let texto = lista[Math.floor(Math.random()*lista.length)];

document.getElementById("mensagem").value = texto;

}

// ================= TREINAMENTO =================
const perguntas = [
{t:"PIX urgente preciso agora",g:true,exp:"Urgência + dinheiro é golpe comum."},
{t:"Reunião amanhã",g:false,exp:"Mensagem normal."},
{t:"Você ganhou prêmio",g:true,exp:"Promessa de ganho fácil."},
{t:"Envie seu CPF",g:true,exp:"Nunca envie dados pessoais."},
{t:"Vamos almoçar?",g:false,exp:"Mensagem comum."},
{t:"Mãe troquei de número manda dinheiro",g:true,exp:"Golpe do familiar."},
{t:"Seu cartão foi clonado confirme dados",g:true,exp:"Banco não pede isso."},
{t:"Te ligo depois",g:false,exp:"Sem risco."}
];

let atual=0;
let acertos=0;
let total=0;

function novaPergunta(){
atual = Math.floor(Math.random()*perguntas.length);
document.getElementById("treinoTexto").innerText = perguntas[atual].t;
}

function responder(r){

const f = document.getElementById("feedbackTreino");

total++;

if(r === perguntas[atual].g){
acertos++;
f.innerHTML = "✅ Acertou! " + perguntas[atual].exp;
f.style.color="green";
}else{
f.innerHTML = "❌ Errou! " + perguntas[atual].exp;
f.style.color="red";
}

let p = Math.round((acertos/total)*100);

document.getElementById("barraProgresso").style.width = p+"%";
document.getElementById("textoProgresso").innerText = acertos+" de "+total;

setTimeout(novaPergunta,1500);

}

novaPergunta();

</script>

</body>
</html>
