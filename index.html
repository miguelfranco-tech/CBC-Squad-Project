<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>
/* ================= BASE ================= */
body{
font-family:Arial;
background:#eef4ff;
padding:20px;
text-align:center;
}

/* ================= CONTAINER ================= */
.container{
max-width:950px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* ================= INPUT ================= */
textarea{
width:100%;
height:140px;
padding:12px;
border-radius:10px;
font-size:16px;
margin-bottom:10px;
border:1px solid #ccc;
}

/* ================= BOTÕES ================= */
button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.primary{background:#1976d2;color:white;}
.secondary{background:#e3f2fd;}

/* ================= RESULT ================= */
.result{
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:left;
animation:fadeIn 0.4s ease;
}

.baixo{background:#e8f5e9;}
.medio{background:#fffde7;}
.alto{background:#ffebee;}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* ================= TREINO ================= */
.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:12px;
}

/* ================= PLACAR ================= */
#placar{
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="mensagem" placeholder="Digite uma mensagem suspeita"></textarea>

<br>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado" class="result"></div>

<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span> |
📈 Nível: <span id="nivelUser">Iniciante</span>
</div>

<div class="treino">
<h3>🎓 Treinamento para não cair em golpes</h3>

<p id="fraseTreino"></p>

<button onclick="responderTreino(true)">❌ É golpe</button>
<button onclick="responderTreino(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetPlacar()">🔄 Resetar treino</button>

</div>

</div>

<script>

// ================= NORMALIZAR =================
function normalizar(txt){
return txt.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g,"");
}

// ================= BANCO EXTENSO =================
const banco = {
dinheiro:["pix","dinheiro","transferencia","deposito","pagamento","valor","taxa","cobranca","envia valor","manda dinheiro","urgente pix","fazer pix"],
dados:["cpf","senha","codigo","cartao","dados","validar conta","codigo sms","confirmar dados","informar dados","verificacao"],
urgencia:["urgente","agora","imediato","ja","rapido","ultimo aviso","tempo limitado","pra hoje","agora mesmo"],
acao:["mande","envie","clique","confirme","acesse","responda","preencha","valide","faça agora"],
premio:["premio","ganhou","beneficio","sorteio","bonus","recompensa","retire valor","valor liberado"],
emocao:["socorro","me ajuda","por favor","preciso","desespero","urgente ajuda"],
fake:["nova lei","governo liberou","compartilhe isso","nao aparece na tv","segredo revelado","midia nao mostra"]
};

// ================= CONTADOR =================
function contar(lista,texto){
return lista.filter(p=>texto.includes(p)).length;
}

// ================= ANALISAR =================
function analisar(){

let r = document.getElementById("resultado");

// IA loading
r.className="result medio";
r.innerHTML=`
<h3>🧠 IA analisando...</h3>
<p>Processando padrões e contexto...</p>
<div style="height:10px;background:#ddd;border-radius:10px;">
<div id="barraIA" style="height:100%;width:0%;background:#1976d2;"></div>
</div>
`;

setTimeout(()=>{document.getElementById("barraIA").style.width="100%";},100);

// delay
setTimeout(()=>{

let texto = normalizar(document.getElementById("mensagem").value);

let risco=0;
let motivos=[];

// ===== SCORE POR CATEGORIA =====
let sDin=contar(banco.dinheiro,texto);
let sDad=contar(banco.dados,texto);
let sUrg=contar(banco.urgencia,texto);
let sAca=contar(banco.acao,texto);
let sPre=contar(banco.premio,texto);
let sEmo=contar(banco.emocao,texto);
let sFake=contar(banco.fake,texto);

risco += sDin*15;
risco += sDad*20;
risco += sUrg*10;
risco += sAca*10;
risco += sPre*12;
risco += sEmo*10;
risco += sFake*15;

// ===== MOTIVOS =====
if(sDin) motivos.push("💰 dinheiro");
if(sDad) motivos.push("🔒 dados pessoais");
if(sUrg) motivos.push("⏰ urgência");
if(sAca) motivos.push("👉 ação obrigatória");
if(sPre) motivos.push("🎁 prêmio");
if(sEmo) motivos.push("😢 emoção");
if(sFake) motivos.push("📢 possível fake news");

// ===== REGRAS AVANÇADAS =====
if((texto.match(/urgente/g)||[]).length>=2){
risco+=20;
motivos.push("repetição de urgência");
}

if(texto.split(" ").length<=5 && risco>20){
risco+=15;
motivos.push("mensagem curta suspeita");
}

if((sDin||sDad) && sUrg){
risco=90;
motivos.push("combinação crítica");
}

if(/me manda pix/.test(texto)){
risco=95;
motivos.push("frase clássica de golpe");
}

// ===== LIMITES =====
if(risco>100) risco=100;
if(risco<5) risco=5;

// ===== CLASSIFICAÇÃO =====
let classe = risco<30?"baixo":risco<70?"medio":"alto";
let nivel = risco>70?"🔴 Alto risco":risco>40?"🟡 Atenção":"🟢 Seguro";

// ===== EXPLICAÇÃO =====
let explicacao = `
A IA identificou padrões como ${motivos.join(", ") || "nenhum sinal relevante"}.
Esses elementos são frequentemente usados em golpes digitais para pressionar decisões rápidas.
`;

let recomendacao = risco>70
? "Não realize nenhuma ação. Não envie dinheiro nem dados. Confirme por outro canal."
: "Mantenha cautela e verifique a origem da mensagem.";

// ===== OUTPUT =====
r.className="result "+classe;

r.innerHTML=`
<h3>${nivel}</h3>
<p><b>Risco:</b> ${risco}%</p>

<p><b>Sinais detectados:</b><br>
${motivos.join("<br>") || "Nenhum"}
</p>

<p><b>Interpretação:</b><br>
${explicacao}
</p>

<p><b>Recomendação:</b><br>
${recomendacao}
</p>

<div style="margin-top:10px;">
<b>Confiança:</b>
<div style="height:10px;background:#ddd;border-radius:10px;">
<div style="width:${risco}%;height:100%;background:${risco>70?"red":risco>40?"orange":"green"};"></div>
</div>
</div>
`;

},1500);
}

// ================= TREINO =================

let acertos=0, erros=0;

const treino=[
{frase:"me manda pix urgente",golpe:true},
{frase:"envie cpf agora",golpe:true},
{frase:"ganhou premio clique aqui",golpe:true},
{frase:"clique para validar conta",golpe:true},
{frase:"bom dia tudo bem",golpe:false},
{frase:"vamos jantar hoje",golpe:false},
{frase:"te vejo amanhã",golpe:false},
{frase:"reunião às 14h",golpe:false}
];

let atual="";

function novaFrase(){
let obj=treino[Math.floor(Math.random()*treino.length)];
atual=obj.frase;
document.getElementById("fraseTreino").innerText=atual;
document.getElementById("feedback").innerText="";
}

function responderTreino(resp){

let texto=normalizar(atual);

let suspeita=/(pix|cpf|urgente|premio|clique)/.test(texto);
let correta=suspeita;

if(resp===correta) acertos++;
else erros++;

let total=acertos+erros;
let precisao=Math.round((acertos/total)*100);

let nivelUser="Iniciante";
if(precisao>70) nivelUser="Intermediário";
if(precisao>90) nivelUser="Avançado";

document.getElementById("nivelUser").innerText=nivelUser;
document.getElementById("acertos").innerText=acertos;
document.getElementById("erros").innerText=erros;
document.getElementById("total").innerText=total;
document.getElementById("precisao").innerText=precisao+"%";

let fb=document.getElementById("feedback");

fb.innerHTML=`
${resp===correta?"✅ Correto":"❌ Errado"}<br><br>
Essa mensagem ${suspeita?"apresenta sinais claros de golpe":"parece segura"}.
<br><br>
🛡️ Como evitar:
<br>• Nunca envie dinheiro sem confirmação
<br>• Não compartilhe dados pessoais
<br>• Desconfie de urgência
`;

setTimeout(novaFrase,7000);
}

function resetPlacar(){
acertos=0;erros=0;
document.getElementById("nivelUser").innerText="Iniciante";
document.getElementById("acertos").innerText=0;
document.getElementById("erros").innerText=0;
document.getElementById("total").innerText=0;
document.getElementById("precisao").innerText="0%";
}

function gerarMensagem(){
let lista=[
"me manda pix urgente",
"envie cpf agora",
"ganhou premio",
"nova lei libera dinheiro",
"bom dia tudo bem"
];
document.getElementById("mensagem").value=lista[Math.floor(Math.random()*lista.length)];
}

function exemplo(tipo){
let banco=["Conta bloqueada confirme CPF","Acesso suspeito detectado"];
let premio=["Você ganhou prêmio clique","Retire prêmio agora"];
let fake=["Nova lei libera dinheiro","Governo liberou benefício"];

let lista=tipo==="banco"?banco:tipo==="premio"?premio:fake;

document.getElementById("mensagem").value=lista[Math.floor(Math.random()*lista.length)];
}

novaFrase();

</script>

</body>
</html>
