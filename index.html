<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ================= BODY ================= */
body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#e3f2fd,#ffffff);
display:flex;
justify-content:center;
min-height:100vh;
}

/* ================= CONTAINER ================= */
.container{
width:90%;
max-width:900px;
margin-top:40px;
text-align:center;
}

/* ================= TÍTULO ================= */
h2{
margin-bottom:15px;
}

/* ================= TEXTAREA ================= */
textarea{
width:100%;
height:120px;
border-radius:10px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
resize:none;
}

/* ================= BOTÕES ================= */
button{
padding:12px 22px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.primary{
background:#2196f3;
color:white;
}

.secondary{
background:#e3f2fd;
color:#0d47a1;
}

/* ================= RESULTADO ================= */
.resultado-box{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:left;
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1;}
}

/* ================= BARRA ================= */
.risk-bar{
width:100%;
height:12px;
background:#eee;
border-radius:10px;
margin:10px 0;
overflow:hidden;
}

.risk-fill{
height:100%;
border-radius:10px;
transition:width .6s ease;
}

/* ================= TREINO ================= */
.treino{
margin-top:40px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.correct{color:green;font-weight:bold;}
.error{color:red;font-weight:bold;}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="entrada" placeholder="Digite uma mensagem suspeita..."></textarea>

<br>

<button class="primary" onclick="analisar()">🔍 Analisar</button>
<button class="secondary" onclick="gerar()">✨ Gerar exemplo</button>

<br>

<!-- 🔥 BOTÕES ADICIONADOS -->
<button class="secondary" onclick="exemplo('banco')">🏦 Golpe Bancário</button>
<button class="secondary" onclick="exemplo('premio')">🎁 Golpe de Prêmio</button>
<button class="secondary" onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado"></div>

<!-- ================= TREINO ================= -->
<div class="treino">

<h3>🎓 Treinamento Inteligente</h3>

<p id="fraseTreino"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetTreino()">🔄 Resetar treino</button>

</div>

</div>

<script>

/* ================= SANITIZAR ================= */
function safeHTML(str){
return str.replace(/[<>&"]/g,function(c){
return {"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c];
});
}

/* ================= NORMALIZAR ================= */
function normalizar(txt){
return txt.toLowerCase()
.replace(/0/g,"o")
.replace(/1/g,"i")
.replace(/3/g,"e")
.replace(/4/g,"a")
.replace(/5/g,"s")
.replace(/7/g,"t")
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g," ");
}

/* ================= IA ================= */
function analisarMensagem(texto){

texto = normalizar(texto);

let risco = 0;
let sinais = [];
let explicacao = [];

/* ===== PADRÕES ===== */
const padroes = [

{r:/\burgente\b|\bagora\b|\bimediato\b/,p:25,n:"Urgência",e:"Pressão para agir rapidamente."},

{r:/\bganhe dinheiro\b|\brenda extra\b|\blucro facil\b/,p:30,n:"Dinheiro fácil",e:"Promessa irreal de ganho."},

{r:/\bcpf\b|\bsenha\b|\bcodigo\b|\bverificacao\b/,p:40,n:"Dados sensíveis",e:"Solicitação de informações pessoais."},

{r:/\bclique\b|\bacesse\b|\blink\b|http/,p:25,n:"Link suspeito",e:"Possível redirecionamento para site falso."},

{r:/\bbanco\b|\bsuporte\b|\bcentral\b/,p:15,n:"Falsa autoridade",e:"Tentativa de parecer empresa oficial."},

{r:/\bnova lei\b|\bgoverno liberou\b|\bninguem fala\b/,p:30,n:"Fake news",e:"Padrão típico de desinformação viral."}

];

/* ===== ANALISAR ===== */
padroes.forEach(p=>{
if(p.r.test(texto)){
risco += p.p;
sinais.push(p.n);
explicacao.push("• "+p.e);
}
});

/* ===== COMBINAÇÕES ===== */
if(/\bpix\b|\bdinheiro\b/.test(texto) && /\burgente\b|\bagora\b/.test(texto)){
risco += 25;
explicacao.push("• Dinheiro + urgência (golpe clássico).");
}

if(/\bcodigo\b/.test(texto) && /\benvie\b|\bmande\b/.test(texto)){
risco += 30;
explicacao.push("• Pedido de código de verificação.");
}

/* ===== LIMITAR ===== */
risco = Math.min(risco,100);

/* ===== CLASSIFICAR ===== */
let nivel =
risco>=70?"🔴 Alto risco":
risco>=40?"🟡 Atenção":"🟢 Seguro";

/* ===== PREVENÇÃO ===== */
let prevencao = [
"Não envie dinheiro sem confirmar",
"Não compartilhe dados pessoais",
"Não clique em links desconhecidos",
"Confirme com fontes oficiais"
];

return {risco,nivel,sinais,explicacao,prevencao};

}

/* ================= ANALISAR ================= */
function analisar(){

let entrada = document.getElementById("entrada").value;

if(!entrada){
alert("Digite uma mensagem!");
return;
}

let res = analisarMensagem(entrada);
mostrar(res);

}

/* ================= MOSTRAR ================= */
function mostrar(res){

let cor =
res.risco>=70?"#f44336":
res.risco>=40?"#ff9800":"#4caf50";

document.getElementById("resultado").innerHTML = `
<div class="resultado-box">

<h3>${res.nivel}</h3>

<div class="risk-bar">
<div class="risk-fill" style="width:${res.risco}%;background:${cor}"></div>
</div>

<p><b>Risco:</b> ${res.risco}%</p>

<p><b>Sinais:</b><br>
${res.sinais.length ? res.sinais.map(s=>"• "+safeHTML(s)).join("<br>") : "Nenhum"}
</p>

<p><b>Explicação:</b><br>
${res.explicacao.length ? res.explicacao.map(e=>safeHTML(e)).join("<br>") : "Nenhum sinal forte"}
</p>

<p><b>Como evitar:</b><br>
${res.prevencao.map(p=>"• "+p).join("<br>")}
</p>

</div>
`;
}

/* ================= GERAR ================= */
function gerar(){

const lista = [
"URGENTE: me manda um pix agora",
"Você ganhou um prêmio, clique no link",
"Envie seu código imediatamente",
"Reunião amanhã às 14h",
"Nova lei libera dinheiro"
];

document.getElementById("entrada").value =
lista[Math.floor(Math.random()*lista.length)];

}

/* ================= EXEMPLOS ================= */
function exemplo(tipo){

const exemplos = {

banco:[
"URGENTE: sua conta foi bloqueada, confirme seu CPF agora",
"Acesso suspeito detectado, envie seu código de verificação"
],

premio:[
"Parabéns! Você ganhou um prêmio, clique no link",
"Você foi selecionado para um benefício, informe seus dados"
],

fake:[
"Nova lei libera dinheiro para todos",
"Informação vazada: ninguém fala sobre isso"
]

};

let lista = exemplos[tipo];

document.getElementById("entrada").value =
lista[Math.floor(Math.random()*lista.length)];

}

/* ================= TREINO ================= */
let treino = [

{t:"URGENTE! me manda um PIX agora",g:true,e:"Urgência + dinheiro"},
{t:"Reunião amanhã às 14h",g:false,e:"Mensagem normal"},
{t:"Envie seu código agora",g:true,e:"Código nunca deve ser enviado"},
{t:"Bom dia tudo bem?",g:false,e:"Mensagem comum"}

];

let atual=0;

function mostrarTreino(){
document.getElementById("fraseTreino").innerText = treino[atual].t;
}

mostrarTreino();

function responder(resp){

let correto = treino[atual].g;
let fb = document.getElementById("feedback");

if(resp===correto){
fb.innerHTML=`<span class="correct">✔ Correto!</span> ${treino[atual].e}`;
}else{
fb.innerHTML=`<span class="error">❌ Errado!</span> ${treino[atual].e}`;
}

atual=(atual+1)%treino.length;

setTimeout(()=>{
fb.innerHTML="";
mostrarTreino();
},7000);

}

function resetTreino(){
atual=0;
mostrarTreino();
document.getElementById("feedback").innerHTML="";
}

</script>

</body>
</html>
