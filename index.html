<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🛡️ Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  margin:0;
}

.header{
  background:#1e293b;
  color:white;
  padding:20px;
}

.container{
  max-width:750px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:15px;
}

textarea{
  width:100%;
  height:120px;
  padding:10px;
  border-radius:10px;
  border:2px solid #ccc;
  font-size:16px;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#3b82f6;
  color:white;
}

.resultado{
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  background:#fff3f3;
  font-size:18px;
}

.barra{
  margin-top:10px;
  height:20px;
  background:#ddd;
  border-radius:10px;
}

.progresso{
  height:100%;
  width:0%;
  border-radius:10px;
  transition:0.5s;
}

.exemplos{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.card{
  flex:1;
  padding:10px;
  border-radius:10px;
  text-align:center;
  background:#eef2ff;
}
</style>
</head>

<body>

<div class="header">
<h1>🛡️ Escudo Digital</h1>
</div>

<div class="container">

<h3>Cole a mensagem:</h3>
<textarea id="mensagem"></textarea>

<button onclick="analisar()">🔍 Analisar</button>

<div class="barra">
<div id="barra" class="progresso"></div>
</div>

<div id="resultado" class="resultado"></div>

<h3>Exemplos</h3>
<div class="exemplos">
<div class="card"><button onclick="ex('premio')">🎁 Prêmio</button></div>
<div class="card"><button onclick="ex('banco')">🏦 Banco</button></div>
<div class="card"><button onclick="ex('fake')">📢 Fake</button></div>
</div>

</div>

<script>

function analisar(){

let texto = document.getElementById("mensagem").value.toLowerCase();
texto = texto.normalize("NFD").replace(/[\u0300-\u036f]/g,"");

let score = 0;
let explicacao = [];
let tipo = "Mensagem comum";
let estrategia = [];

// FUNÇÃO INTELIGENTE
function detectar(lista, pontos, nome){
  lista.forEach(p=>{
    if(texto.includes(p)){
      score += pontos;
      explicacao.push(nome + ": " + p);
    }
  });
}

// 🟢 NORMAL (REDUZ ERRO)
detectar([
"reunião online","link da reunião","arquivo anexo","encaminhamento",
"atualização do sistema","status do pedido","confirmação de presença",
"horário marcado","envio realizado","suporte técnico",
"atendimento ao cliente","contato realizado","retorno solicitado",
"informação adicional","acompanhamento do processo"
], -2, "Normal");

// 🟠 LEVE
detectar([
"promoção especial","oferta exclusiva hoje","desconto imperdível",
"novidade pra você","veja agora","acesso liberado","confira já",
"só hoje","recomendado pra você","conteúdo exclusivo","você pode gostar",
"oportunidade limitada","vantagem especial","oferta personalizada","não perca"
], 1, "Marketing");

// 🟡 MÉDIO
detectar([
"ação imediata necessária","sua conta será afetada","acesso temporário liberado",
"confirmação urgente","sistema detectou atividade","tentativa de login",
"atualização de segurança","revisão obrigatória","validação pendente",
"acesso restrito","notificação importante","sua conta precisa de atenção",
"processo de verificação","autenticação pendente","alerta automático"
], 3, "Suspeito");

// 🔴 ALTO
detectar([
"pix urgente","chave pix inválida","pagamento pendente pix",
"transferência via pix","envie o pix agora","código do whatsapp",
"código de verificação","token de acesso","confirme seu login",
"redefina sua senha agora","dados do cartão","cvv do cartão",
"banco solicitando confirmação","acesso suspeito detectado",
"sua conta foi invadida"
], 6, "Golpe forte");

// BASE ANTIGA (MANTIDA)
detectar(["urgente","agora","imediato"],2,"Urgência");
detectar(["cpf","senha","codigo","cartao"],5,"Dados sensíveis");
detectar(["link","clique","acesse"],3,"Link");

// 🧠 COMBINAÇÕES (MUITO IMPORTANTE)
if(texto.includes("pix") && texto.includes("urgente")){
score += 8;
tipo = "Golpe via Pix";
}

if(texto.includes("cpf") && texto.includes("link")){
score += 8;
tipo = "Phishing";
}

if(texto.includes("senha") && texto.includes("codigo")){
score += 7;
tipo = "Roubo de conta";
}

if(texto.includes("compartilhe") && texto.includes("urgente")){
score += 5;
tipo = "Fake news";
}

// 🎭 ESTRATÉGIA
if(texto.includes("urgente")) estrategia.push("Pressão");
if(texto.includes("ganhe") || texto.includes("premio")) estrategia.push("Recompensa");
if(texto.includes("invadida") || texto.includes("bloqueada")) estrategia.push("Medo");

// LIMITES
if(score < 0) score = 0;

let risco = Math.min(score * 4, 100);

// CLASSIFICAÇÃO CLARA
let nivel = "";
let cor = "";

if(risco >= 70){
nivel = "🔴 CUIDADO! Pode ser golpe";
cor = "red";
}
else if(risco >= 40){
nivel = "🟡 Atenção! Mensagem suspeita";
cor = "orange";
}
else if(risco > 0){
nivel = "🟠 Baixo risco";
cor = "yellow";
}
else{
nivel = "🟢 Mensagem segura";
cor = "green";
}

// BARRA
document.getElementById("barra").style.width = risco+"%";
document.getElementById("barra").style.background = cor;

// RESULTADO SIMPLES (IDOSOS)
document.getElementById("resultado").innerHTML =
"<b style='font-size:20px'>"+nivel+"</b><br><br>"+
"Risco: "+risco+"%<br><br>"+
"Tipo: "+tipo+"<br>"+
"Estratégia: "+(estrategia.join(", ")||"Nenhuma")+"<br><br>"+
"💡 Dica: Não envie dados e não clique em links desconhecidos.";

}

// EXEMPLOS
function ex(t){
let lista = [];

if(t=="premio"){
lista=[
"Parabéns! Você ganhou um prêmio, informe seu CPF agora!",
"Ganhe dinheiro fácil, clique no link!",
"Você foi sorteado, resgate já!"
];
}

if(t=="banco"){
lista=[
"URGENTE! Sua conta foi invadida!",
"Confirme seu login agora ou será bloqueado!",
"Acesso suspeito detectado!"
];
}

if(t=="fake"){
lista=[
"Compartilhe antes que apaguem!",
"A mídia não mostra isso!",
"Envie isso para todos!"
];
}

let msg = lista[Math.floor(Math.random()*lista.length)];
document.getElementById("mensagem").value = msg;
analisar();
}

</script>

</body>
</html>
