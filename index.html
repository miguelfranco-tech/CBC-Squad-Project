<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escudo Digital</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#e0f2fe,#f8fafc);
  text-align:center;
  padding:20px;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  padding:10px;
  border:2px solid #cbd5e1;
  resize:none;
  box-sizing:border-box;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0284c7;
  color:white;
  cursor:pointer;
}

button:hover{opacity:0.9;}

#barraContainer{
  background:#e2e8f0;
  border-radius:10px;
  margin-top:10px;
}

#barra{
  height:20px;
  border-radius:10px;
  width:0%;
  transition:0.6s;
}

#resultado{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#f8fafc;
  display:none;
}

.destaque{
  background:#fecaca;
  padding:2px;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Escudo Digital</h1>
<p>Detecta golpes, fake news e manipulação digital.</p>

<textarea id="mensagem" placeholder="Cole a mensagem aqui..."></textarea>

<br>
<button onclick="analisar()">🔍 Analisar</button>
<button onclick="simular()">⚡ Simular golpe</button>

<div id="barraContainer">
  <div id="barra"></div>
</div>

<div id="resultado"></div>

<h3>Exemplos</h3>
<button onclick="exemplo('premio')">🎁 Premiação</button>
<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('fake')">📢 Fake News</button>

<h3>🧠 Treinar</h3>
<p id="simMsg"></p>
<button onclick="responder(true)">✔ Confiar</button>
<button onclick="responder(false)">❌ Desconfiar</button>
<p id="simRes"></p>
<p id="placar"></p>
<button onclick="novaSim()">🔄 Nova</button>

</div>

<script>

// 🔧 normalizar
function normalizar(t){
return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// 🧠 MEMÓRIA
function carregarMemoria(){
return JSON.parse(localStorage.getItem("memoriaIA") || "[]");
}

function salvarMemoria(mem){
localStorage.setItem("memoriaIA", JSON.stringify(mem));
}

function aprender(texto, score){
let mem = carregarMemoria();
if(score > 60){
mem.push(texto);
}
if(mem.length > 50) mem.shift();
salvarMemoria(mem);
}

// 🎯 ANALISAR
function analisar(){

let original = document.getElementById("mensagem").value;
let texto = normalizar(original);
let memoria = carregarMemoria();

if(!texto.trim()){
alert("Digite algo");
return;
}

let score = 0;
let motivos = [];
let explicacao = [];
let palavras = [];
let intencao = [];

// 🔴 PADRÕES
const padroes = [
["envie seus dados",25,"🚨 Pedido de dados"],
["informe seus dados",25,"🚨 Solicitação de dados"],
["senha",30,"🔒 Senha"],
["codigo",20,"📱 Código"],
["cpf",25,"🪪 CPF"],
["pix",30,"💸 PIX"],
["urgente",10,"⚠️ Urgência"],
["agora",10,"⚠️ Pressão"],
["hackeada",25,"😨 Conta hackeada"],
["invadida",25,"😨 Conta invadida"],
["clique aqui",10,"🔗 Link"],
["compartilhe",15,"📢 Fake news"],
["midia",15,"📢 Fake news"]
];

padroes.forEach(p=>{
if(texto.includes(p[0])){
score += p[1];
motivos.push(p[2]);
palavras.push(p[0]);
}
});

// 🧠 CONTEXTO
if(texto.includes("envie") && (texto.includes("cpf")||texto.includes("senha"))){
score += 35;
explicacao.push("🚨 Solicitação de dados sensíveis");
intencao.push("Roubo de dados");
}

// 🔁 MEMÓRIA IA
memoria.forEach(frase=>{
let palavrasMem = frase.split(" ");
let match = palavrasMem.filter(p=>texto.includes(p));
if(match.length >= 3){
score += 15;
explicacao.push("🔁 Similar a golpe anterior");
}
});

// limite
if(score<0) score=0;
let porcentagem = Math.min(100, score);

// 🎨 BARRA
let barra = document.getElementById("barra");
barra.style.width = porcentagem+"%";

if(porcentagem<30) barra.style.background="green";
else if(porcentagem<70) barra.style.background="orange";
else barra.style.background="red";

// 💬 FRASES
let frase = porcentagem>70 ? "🚨 Isso parece golpe!"
: porcentagem>40 ? "⚠️ Fique atento"
: "🙂 Parece seguro";

// 🎨 DESTAQUE
function destacar(txt, palavras){
let r = txt;
palavras.forEach(p=>{
r = r.replace(new RegExp("("+p+")","gi"),'<span class="destaque">$1</span>');
});
return r;
}

let textoDestacado = destacar(original, palavras);

// 📤 RESULTADO
let res = document.getElementById("resultado");
res.style.display="block";

res.innerHTML =
"<b>"+porcentagem+"% de risco</b><br><br>"+
frase+"<br><br>"+
"<b>Motivos:</b><br>"+motivos.join("<br>")+"<br><br>"+
"<b>Explicação:</b><br>"+(explicacao.join("<br>")||"Nenhuma")+"<br><br>"+
"<b>Mensagem:</b><br>"+textoDestacado;

// 🧠 aprender
aprender(texto, score);
}

// ⚡ SIMULAÇÃO
function simular(){
document.getElementById("mensagem").value =
"Envie seu CPF agora ou sua conta será bloqueada";
analisar();
}

// 📌 EXEMPLOS
function exemplo(t){
if(t=="premio") document.getElementById("mensagem").value="Você ganhou um prêmio clique aqui";
if(t=="banco") document.getElementById("mensagem").value="Sua conta foi hackeada envie CPF";
if(t=="fake") document.getElementById("mensagem").value="Compartilhe antes que a mídia apague";
analisar();
}

// 🧠 TREINO
let acertos = 0;

let simulacoes = [
{msg:"Envie seu CPF urgente", correto:false},
{msg:"Reunião amanhã", correto:true},
{msg:"Clique para ganhar prêmio", correto:false},
{msg:"Entrega confirmada", correto:true}
];

function novaSim(){
let s = simulacoes[Math.floor(Math.random()*simulacoes.length)];
window.simAtual = s;
document.getElementById("simMsg").innerText = s.msg;
document.getElementById("simRes").innerText="";
}

function responder(r){
if(r === window.simAtual.correto){
acertos++;
document.getElementById("simRes").innerText="✅ Acertou!";
}else{
document.getElementById("simRes").innerText="❌ Era golpe!";
}
document.getElementById("placar").innerText="Acertos: "+acertos;
}

novaSim();

</script>

</body>
</html>
