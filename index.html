<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escudo Digital IA</title>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ================= BODY ================= */
body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#e3f2fd,#ffffff);
display:flex;
justify-content:center;
min-height:100vh;
}

/* ================= CONTAINER ================= */
.container{
width:90%;
max-width:900px;
margin-top:40px;
text-align:center;
}

/* ================= INPUT ================= */
textarea{
width:100%;
height:120px;
border-radius:10px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
resize:none;
}

/* ================= BOTÕES ================= */
button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.primary{
background:#2196f3;
color:white;
}

.secondary{
background:#e3f2fd;
color:#0d47a1;
}

/* ================= RESULTADO ================= */
.resultado-box{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:left;
animation:fade .4s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* ================= BARRA ================= */
.risk-bar{
width:100%;
height:12px;
background:#eee;
border-radius:10px;
margin:10px 0;
overflow:hidden;
}

.risk-fill{
height:100%;
border-radius:10px;
transition:.6s;
}

/* ================= TREINO ================= */
.treino{
margin-top:30px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.correct{color:green;font-weight:bold;}
.error{color:red;font-weight:bold;}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="entrada" placeholder="Digite uma mensagem suspeita..."></textarea>

<br>

<button class="primary" onclick="analisar()">🔍 Analisar</button>
<button class="secondary" onclick="gerar()">✨ Gerar</button>

<br>

<button class="secondary" onclick="exemplo('banco')">🏦 Golpe Bancário</button>
<button class="secondary" onclick="exemplo('premio')">🎁 Golpe de Prêmio</button>
<button class="secondary" onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado"></div>

<div class="treino">

<h3>🎓 Treinamento Inteligente</h3>

<p id="fraseTreino"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="resetTreino()">🔄 Resetar</button>

</div>

</div>

<script>

/* ================= SANITIZAR ================= */
function esc(str){
return str.replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));
}

/* ================= NORMALIZAÇÃO AVANÇADA ================= */
function normalizar(txt){
return txt.toLowerCase()
.replace(/0/g,"o")
.replace(/1/g,"i")
.replace(/3/g,"e")
.replace(/4/g,"a")
.replace(/5/g,"s")
.replace(/7/g,"t")
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^\w\s]/g," ")
.replace(/(.)\1{2,}/g,"$1")
.replace(/\bp[\W_]*[i1l][\W_]*x\b/g,"pix")
.replace(/\bc[\W_]*0[\W_]*d[\W_]*i[\W_]*g[\W_]*o\b/g,"codigo");
}

/* ================= IA PRECISÃO MÁXIMA ================= */
function analisarMensagem(texto){

texto = normalizar(texto);

let risco = 0;
let sinais = new Set();
let explicacao = new Set();

/* ===== BLOCOS ===== */
let acao = /\b(envie|mande|clique|acesse|confirme|resgate|transfira|faça)\b/.test(texto);
let urgencia = /\b(urgente|agora|ja|imediato|rapido)\b/.test(texto);
let dinheiro = /\b(pix|dinheiro|transferencia|deposito|valor)\b/.test(texto);
let dados = /\b(cpf|senha|codigo|verificacao|cartao)\b/.test(texto);
let autoridade = /\b(banco|suporte|central|governo|atendente)\b/.test(texto);
let premio = /\b(premio|ganhou|beneficio|resgate)\b/.test(texto);
let link = /\b(http|link|acesse)\b/.test(texto);
let emocional = /\b(me ajuda|por favor|socorro|preciso muito)\b/.test(texto);

/* ===== SCORE BASE ===== */
if(acao){risco+=15; sinais.add("Ação"); explicacao.add("A mensagem pede que você execute uma ação.");}
if(urgencia){risco+=20; sinais.add("Urgência"); explicacao.add("Existe pressão para agir rapidamente, reduzindo sua análise crítica.");}
if(dinheiro){risco+=30; sinais.add("Dinheiro"); explicacao.add("Solicitação envolvendo envio de dinheiro.");}
if(dados){risco+=40; sinais.add("Dados sensíveis"); explicacao.add("Pedido de informações pessoais ou códigos.");}
if(autoridade){risco+=15; sinais.add("Autoridade"); explicacao.add("A mensagem tenta se passar por instituição confiável.");}
if(premio){risco+=25; sinais.add("Prêmio"); explicacao.add("Promessa de benefício fácil ou inesperado.");}
if(link){risco+=25; sinais.add("Link"); explicacao.add("Pode direcionar para site falso.");}
if(emocional){risco+=20; sinais.add("Pressão emocional"); explicacao.add("Uso de emoção para acelerar decisão.");}

/* ===== FAKE NEWS ===== */
if(/(governo.*liberou|nova lei.*libera|ninguem fala|segredo)/.test(texto)){
risco+=40;
sinais.add("Fake News");
explicacao.add("Estrutura típica de desinformação viral.");
}

/* ===== COMBINAÇÕES INTELIGENTES ===== */
if(dinheiro && urgencia && acao){
risco = Math.max(risco,97);
explicacao.add("Combinação crítica: dinheiro + urgência + ação.");
}

if(dados && acao){
risco = Math.max(risco,97);
explicacao.add("Pedido direto de dados sensíveis com instrução.");
}

if(autoridade && link){
risco = Math.max(risco,92);
explicacao.add("Possível tentativa de phishing.");
}

if(premio && acao){
risco = Math.max(risco,92);
explicacao.add("Golpe de prêmio com instruções.");
}

if(emocional && dinheiro){
risco = Math.max(risco,90);
explicacao.add("Manipulação emocional para obter dinheiro.");
}

/* ===== DETECÇÃO IMPLÍCITA ===== */
if(/troquei.*numero/.test(texto)){
risco = Math.max(risco,95);
explicacao.add("Padrão comum do golpe do número trocado.");
}

if(/me manda.*valor/.test(texto)){
risco += 30;
explicacao.add("Pedido indireto de dinheiro.");
}

/* ===== AJUSTES ===== */
if(texto.split(" ").length <= 6 && (dinheiro || dados)){
risco += 15;
explicacao.add("Mensagem curta com conteúdo crítico.");
}

if(/bom dia|boa tarde|reuniao|ate mais/.test(texto)){
risco -= 20;
}

/* ===== LIMITES ===== */
risco = Math.max(0,Math.min(100,risco));

let nivel =
risco>=90?"🔴 Golpe quase certo":
risco>=70?"🔴 Alto risco":
risco>=45?"🟡 Muito suspeito":
risco>=25?"🟠 Atenção":
"🟢 Seguro";

/* ===== EXPLICAÇÃO FINAL ===== */
let resumo = "";

if(risco>=90){
resumo = "A mensagem apresenta múltiplos sinais clássicos de golpe e alta probabilidade de fraude.";
}else if(risco>=60){
resumo = "Há fortes indícios de golpe, recomenda-se não interagir com a mensagem.";
}else if(risco>=30){
resumo = "A mensagem possui sinais suspeitos e deve ser analisada com cautela.";
}else{
resumo = "Não foram identificados sinais críticos relevantes.";
}

return {
risco,
nivel,
sinais:[...sinais],
explicacao:[...explicacao],
resumo
};

}

/* ================= ANALISAR ================= */
function analisar(){

let entrada = document.getElementById("entrada").value;

if(!entrada){
alert("Digite uma mensagem!");
return;
}

let r = analisarMensagem(entrada);

let cor =
r.risco>=70?"#f44336":
r.risco>=40?"#ff9800":"#4caf50";

document.getElementById("resultado").innerHTML = `
<div class="resultado-box">

<h3>${r.nivel}</h3>

<div class="risk-bar">
<div class="risk-fill" style="width:${r.risco}%;background:${cor}"></div>
</div>

<p><b>Risco:</b> ${r.risco}%</p>

<p><b>Resumo:</b> ${r.resumo}</p>

<p><b>Sinais detectados:</b><br>
${r.sinais.map(s=>"• "+esc(s)).join("<br>") || "Nenhum"}
</p>

<p><b>Por que isso é suspeito:</b><br>
${r.explicacao.join("<br>")}
</p>

<p><b>Como evitar:</b><br>
• Não envie dinheiro<br>
• Não compartilhe dados<br>
• Confirme diretamente com a pessoa<br>
• Desconfie de urgência
</p>

</div>
`;
}

/* ================= RESTO DO CÓDIGO (INALTERADO) ================= */
// (mantido exatamente como estava: exemplos, treino, gerar...)

</script>

</body>
</html>
