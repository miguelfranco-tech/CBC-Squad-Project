<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escudo Digital IA</title>

<style>

/* ================= BASE ================= */
body{
font-family: Arial;
background: linear-gradient(135deg,#eef4ff,#f7fbff);
padding:20px;
text-align:center;
}

/* ================= CONTAINER ================= */
.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* ================= TÍTULO ================= */
h2{
margin-bottom:15px;
}

/* ================= INPUT ================= */
textarea{
width:100%;
height:140px;
padding:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
resize:none;
}

/* ================= BOTÕES ================= */
button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.primary{
background:#1976d2;
color:white;
}

.primary:hover{
transform:scale(1.05);
}

.secondary{
background:#e3f2fd;
}

/* ================= RESULTADO ================= */
.result{
margin-top:25px;
padding:20px;
border-radius:14px;
text-align:left;
animation:fade 0.5s ease;
}

/* cores */
.baixo{background:#e8f5e9;}
.medio{background:#fff8e1;}
.alto{background:#ffebee;}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* ================= BARRA DE RISCO ================= */
.risk-bar{
width:100%;
height:12px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.risk-fill{
height:100%;
width:0%;
transition:1s ease;
}

/* cores dinâmicas */
.low{background:#4caf50;}
.medium{background:#ff9800;}
.high{background:#f44336;}

/* ================= TREINO ================= */
.treino{
margin-top:30px;
background:#f5f5f5;
padding:20px;
border-radius:12px;
}

/* ================= PLACAR ================= */
#placar{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>🛡️ Escudo Digital IA</h2>

<textarea id="mensagem" placeholder="Digite uma mensagem suspeita..."></textarea>

<br>

<button class="primary" onclick="analisar()">🔎 Analisar</button>
<button class="secondary" onclick="gerarMensagem()">✨ Gerar</button>

<br>

<button onclick="exemplo('banco')">🏦 Banco</button>
<button onclick="exemplo('premio')">🎁 Prêmio</button>
<button onclick="exemplo('fake')">📰 Fake News</button>

<div id="resultado" class="result"></div>

<div id="placar">
🏆 Acertos: <span id="acertos">0</span> |
❌ Erros: <span id="erros">0</span> |
📊 Total: <span id="total">0</span> |
🎯 Precisão: <span id="precisao">0%</span>
</div>

<div class="treino">
<h3>🎓 Treinamento</h3>

<p id="fraseTreino"></p>

<button onclick="responder(true)">❌ É golpe</button>
<button onclick="responder(false)">✅ É seguro</button>

<p id="feedback"></p>

<button onclick="reset()">🔄 Resetar</button>
</div>

</div>

<script>

/* ================= VARIÁVEIS ================= */
let acertos=0,erros=0,total=0;

/* ================= NORMALIZAR ================= */
function normalizar(t){
return t.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");
}

/* ================= DADOS ================= */
const golpes=[
"me manda pix urgente",
"envie codigo agora",
"ganhou premio clique aqui"
];

/* ================= ANALISAR ================= */
function analisar(){

let input=document.getElementById("mensagem").value;
if(!input)return;

let texto=normalizar(input);

let risco=0;
let sinais=[];

/* regras */
if(/pix|dinheiro/.test(texto)){risco+=40;sinais.push("💰 Pedido de dinheiro");}
if(/cpf|senha|codigo/.test(texto)){risco+=40;sinais.push("🔒 Dados pessoais");}
if(/urgente|agora/.test(texto)){risco+=20;sinais.push("⏰ Urgência");}
if(/ganhou|premio/.test(texto)){risco+=25;sinais.push("🎁 Prêmio suspeito");}

/* ajuste */
if(risco>100)risco=100;
if(risco<5)risco=5;

/* nível */
let nivel,classe,cor;

if(risco<30){nivel="🟢 Seguro";classe="baixo";cor="low";}
else if(risco<70){nivel="🟡 Atenção";classe="medio";cor="medium";}
else{nivel="🔴 Alto risco";classe="alto";cor="high";}

/* resultado */
let r=document.getElementById("resultado");
r.className="result "+classe;

r.innerHTML=`
<h3>${nivel}</h3>

<div class="risk-bar">
<div id="barra" class="risk-fill ${cor}"></div>
</div>

<p><b>Risco:</b> ${risco}%</p>

<p id="explicacao"></p>

<p><b>Sinais:</b><br>${sinais.join("<br>")||"Nenhum"}</p>

<p><b>Como se proteger:</b><br>
• Não envie dinheiro<br>
• Não compartilhe dados<br>
• Confirme com a pessoa real
</p>
`;

/* anima barra */
setTimeout(()=>{
document.getElementById("barra").style.width=risco+"%";
},100);

/* efeito digitação */
digitar("explicacao",
risco>70?
"Essa mensagem apresenta fortes indícios de golpe e deve ser evitada imediatamente.":
risco>30?
"Essa mensagem contém elementos suspeitos e requer atenção.":
"Essa mensagem não apresenta sinais fortes de golpe."
);

}

/* ================= DIGITAÇÃO ================= */
function digitar(id,texto){
let el=document.getElementById(id);
el.innerHTML="";
let i=0;

let intervalo=setInterval(()=>{
el.innerHTML+=texto[i];
i++;
if(i>=texto.length)clearInterval(intervalo);
},20);
}

/* ================= GERAR ================= */
function gerarMensagem(){
let lista=[
"me manda pix urgente",
"bom dia tudo bem",
"ganhou premio clique aqui"
];
document.getElementById("mensagem").value=
lista[Math.floor(Math.random()*lista.length)];
}

/* ================= EXEMPLOS ================= */
function exemplo(tipo){

const dados={
banco:["Conta bloqueada confirme cpf"],
premio:["Você ganhou prêmio clique aqui"],
fake:["Nova lei libera dinheiro"]
};

let lista=dados[tipo];
document.getElementById("mensagem").value=
lista[Math.floor(Math.random()*lista.length)];
}

/* ================= TREINO ================= */
const treino=[
"me manda pix urgente",
"bom dia",
"ganhou premio clique aqui",
"reunião às 14h"
];

let atual="";

function nova(){
atual=treino[Math.floor(Math.random()*treino.length)];
document.getElementById("fraseTreino").innerText=atual;
document.getElementById("feedback").innerText="";
}

function responder(resp){

let texto=normalizar(atual);

let suspeita=/pix|premio|codigo|urgente/.test(texto);

let certo=(resp && suspeita)||(!resp && !suspeita);

if(certo)acertos++;
else erros++;

atualizar();

/* feedback melhorado */
let fb=document.getElementById("feedback");

fb.innerHTML=certo?
"✅ Correto! Essa decisão foi segura.":
"❌ Atenção! Essa mensagem possui sinais de golpe.";

/* delay leitura */
setTimeout(nova,7000);

}

/* ================= PLACAR ================= */
function atualizar(){
total=acertos+erros;
let p=total?Math.round((acertos/total)*100):0;

document.getElementById("acertos").innerText=acertos;
document.getElementById("erros").innerText=erros;
document.getElementById("total").innerText=total;
document.getElementById("precisao").innerText=p+"%";
}

/* ================= RESET ================= */
function reset(){
acertos=0;
erros=0;
atualizar();
}

/* iniciar */
nova();

</script>

</body>
</html>
